<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvocAI Premium — Bienvenue !</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    // Applique le thème immédiatement (avant peinture, pour éviter le FOUC)
    (() => {
      const t = localStorage.getItem('avocai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    [data-theme="light"] {
      --bg-page:        #e8e9eb;
      --bg-card:        #ffffff;
      --text-primary:   #111827;
      --text-muted:     #4b5563;
      --border-default: rgba(0,0,0,0.18);
      --check-bg:       #f0fdf4;
      --check-border:   #bbf7d0;
      --check-color:    #16a34a;
    }
    [data-theme="dark"] {
      --bg-page:        #08090a;
      --bg-card:        #191a1b;
      --text-primary:   #f7f8f8;
      --text-muted:     #8a8f98;
      --border-default: rgba(255,255,255,0.08);
      --check-bg:       rgba(34,197,94,0.10);
      --check-border:   rgba(34,197,94,0.35);
      --check-color:    #22c55e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { transition: background-color 200ms ease, color 200ms ease; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: 18px;
      padding: 48px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
    }
    .logo span {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .check-circle {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--check-bg);
      border: 1.5px solid var(--check-border);
      color: var(--check-color);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 26px;
      font-size: 36px;
      font-weight: 700;
    }
    h1 {
      font-size: 30px;
      font-weight: 590;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #5e6ad2;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.1px;
      transition: background 0.15s;
    }
    .btn:hover { background: #828fff; }
    .loading {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#5e6ad2"/>
        <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fill-opacity="0.95"/>
        <circle cx="14" cy="20" r="1.5" fill="#7170ff"/>
      </svg>
      <span>AvocAI</span>
    </a>

    <div class="check-circle">✓</div>

    <h1 id="title">Bienvenue dans AvocAI Premium !</h1>
    <p id="subtitle">Votre abonnement est actif. Vous pouvez maintenant accéder à toutes les démarches officielles.</p>

    <a href="/" class="btn" id="cta">Retour au chat →</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const planParam = params.get('plan') || '';
    const label = planParam === 'pro_plus' ? 'AvocAI Premium +' : 'AvocAI Premium';
    document.getElementById('title').textContent = 'Bienvenue dans ' + label + ' !';
    document.title = label + ' — Bienvenue !';

    // Active le plan en BDD sans attendre le webhook Stripe (fonctionne en local)
    const token = localStorage.getItem('avocai_token');
    if (token) {
      fetch('/api/activate-plan', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      })
      .then(r => r.json())
      .then(data => {
        if (data.user) {
          localStorage.setItem('avocai_user', JSON.stringify(data.user));
          const lbl = data.plan === 'pro_plus' ? 'AvocAI Premium +' : 'AvocAI Premium';
          document.getElementById('title').textContent = 'Bienvenue dans ' + lbl + ' !';
          document.title = lbl + ' — Bienvenue !';
        }
      })
      .catch(() => {});
    }
  </script>
</body>
</html>
