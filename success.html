<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvocAI Pro — Bienvenue !</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page:      #ffffff;
      --text-primary: #0f1011;
      --text-muted:   #6b6b72;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
      text-decoration: none;
    }
    .logo span {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 32px;
    }
    h1 {
      font-size: 32px;
      font-weight: 510;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      line-height: 1.15;
    }
    p {
      font-size: 18px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #5e6ad2;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 510;
      letter-spacing: -0.1px;
      transition: background 0.15s;
    }
    .btn:hover { background: #828fff; }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#5e6ad2"/>
        <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fill-opacity="0.95"/>
        <circle cx="14" cy="20" r="1.5" fill="#7170ff"/>
      </svg>
      <span>AvocAI</span>
    </a>

    <div class="check-circle">✓</div>

    <h1 id="title">Bienvenue dans AvocAI Premium !</h1>
    <p>Votre abonnement est actif. Vous pouvez maintenant accéder à toutes les démarches officielles.</p>

    <a href="/" class="btn">Retour au chat →</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const planParam = params.get('plan') || '';
    const label = planParam === 'pro_plus' ? 'AvocAI Premium +' : 'AvocAI Premium';
    document.getElementById('title').textContent = 'Bienvenue dans ' + label + ' !';
    document.title = label + ' — Bienvenue !';

    // Active le plan en BDD sans attendre le webhook Stripe (fonctionne en local)
    const token = localStorage.getItem('avocai_token');
    if (token) {
      fetch('/api/activate-plan', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      })
      .then(r => r.json())
      .then(data => {
        if (data.user) {
          localStorage.setItem('avocai_user', JSON.stringify(data.user));
          // Met à jour le titre si le plan retourné diffère du param URL
          const lbl = data.plan === 'pro_plus' ? 'AvocAI Premium +' : 'AvocAI Premium';
          document.getElementById('title').textContent = 'Bienvenue dans ' + lbl + ' !';
          document.title = lbl + ' — Bienvenue !';
        }
      })
      .catch(() => {});
    }
  </script>
</body>
</html>
