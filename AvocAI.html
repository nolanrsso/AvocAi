<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvocAI — Comprenez vos droits. Défendez-vous.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <style>
    /* ── Theme tokens ──────────────────────────────────── */
    :root {
      --bg-page:             #e8e9eb;
      --bg-panel:            #dedfe2;
      --bg-surface:          #ffffff;
      --bg-surface-elevated: #ffffff;
      --text-primary:        #111827;
      --text-body:           #1f2937;
      --text-muted:          #4b5563;
      --text-subtle:         #6b7280;
      --border-default:      rgba(0,0,0,0.18);
      --border-subtle:       rgba(0,0,0,0.12);
      --btn-bg:              #e4e5e7;
      --btn-border:          rgba(0,0,0,0.16);
      --brand:               #5e6ad2;
      --accent:              #7170ff;
      --accent-hover:        #828fff;
      --success:             #27a644;
      --warning:             #f59e0b;
      --danger:              #ef4444;
    }
    [data-theme="light"] {
      --bg-page:             #e8e9eb;
      --bg-panel:            #dedfe2;
      --bg-surface:          #ffffff;
      --bg-surface-elevated: #ffffff;
      --bg-elevated:         #e4e5e7;
      --btn-bg:              #e4e5e7;
      --btn-border:          rgba(0,0,0,0.16);
      --border-default:      rgba(0,0,0,0.18);
      --border-subtle:       rgba(0,0,0,0.12);
      --text-primary:        #111827;
      --text-body:           #1f2937;
      --text-muted:          #4b5563;
      --text-subtle:         #6b7280;
    }
    [data-theme="dark"] {
      --bg-page:             #08090a;
      --bg-panel:            #0f1011;
      --bg-surface:          #191a1b;
      --bg-surface-elevated: #28282c;
      --text-primary:        #f7f8f8;
      --text-body:           #d0d6e0;
      --text-muted:          #8a8f98;
      --text-subtle:         #62666d;
      --border-default:      rgba(255,255,255,0.08);
      --border-subtle:       rgba(255,255,255,0.05);
      --btn-bg:              rgba(255,255,255,0.02);
      --btn-border:          rgba(255,255,255,0.08);
    }

    /* ── Reset & base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { transition: background-color 200ms ease, color 200ms ease; }
    body {
      font-family: "Inter", "Inter Variable", sans-serif;
      font-feature-settings: "cv01", "ss03";
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 9999px; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    textarea::placeholder { color: var(--text-subtle); }
    input::placeholder { color: var(--text-subtle); }
    textarea { color-scheme: light dark; }

    /* ── Responsive navbar ──────────────────────────────── */
    @media (max-width: 767px) {
      .nav-center  { display: none !important; }
      .nav-login   { display: none !important; }
      .nav-try-btn { padding: 5px 10px !important; font-size: 13px !important; width: auto !important; height: 30px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Applique le thème sauvegardé immédiatement ────── */
    (() => {
      const t = localStorage.getItem('avocai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();

    /* ── Récupère le token Google après le redirect OAuth ── */
    (() => {
      const p = new URLSearchParams(window.location.search);
      const t = p.get('auth_token');
      const u = p.get('auth_user');
      if (t) {
        localStorage.setItem('avocai_token', t);
        if (u) { try { localStorage.setItem('avocai_user', decodeURIComponent(u)); } catch {} }
        // Nettoie l'URL sans recharger
        window.history.replaceState({}, '', '/');
      }
    })();

    /* ── Auth helpers ───────────────────────────────────── */
    const getToken = () => localStorage.getItem('avocai_token');
    const getStoredUser = () => {
      try { return JSON.parse(localStorage.getItem('avocai_user') || 'null'); }
      catch { return null; }
    };
    const authHeaders = () => {
      const t = getToken();
      return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' }
               : { 'Content-Type': 'application/json' };
    };
    const logout = () => {
      localStorage.removeItem('avocai_token');
      localStorage.removeItem('avocai_user');
      window.location.href = '/login';
    };

    /* ── Stripe / Pro upgrade ───────────────────────────── */
    const handleProUpgrade = (plan = 'pro', isMonthly = false) => {
      window.location.href = '/checkout?plan=' + plan + '&billing=' + (isMonthly ? 'monthly' : 'weekly');
    };

    // Scroll vers la section Tarifs (depuis n'importe où)
    const scrollToPricing = () => {
      const el = document.getElementById('tarifs');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth' });
      } else {
        // Si on est dans le chat, retour landing + scroll
        window.location.href = '/#tarifs';
      }
    };

    /* ── Shared Components ──────────────────────────────── */

    const RiskMeter = ({ level }) => {
      const getColor = (l) => l <= 2 ? '#27a644' : l === 3 ? '#f59e0b' : '#ef4444';
      const getLabel = (l) => l <= 2 ? 'Faible' : l === 3 ? 'Modéré' : l === 4 ? 'Élevé' : 'Critique';
      const color = getColor(level);
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {[1,2,3,4,5].map(i => (
            <div key={i} style={{
              width: 10, height: 10, borderRadius: '50%',
              background: i <= level ? color : 'var(--border-default)',
              border: i <= level ? 'none' : '1px solid var(--border-default)',
              flexShrink: 0,
            }} />
          ))}
          <span style={{ fontSize: 13, fontWeight: 510, color, fontFeatureSettings: '"cv01","ss03"' }}>
            {getLabel(level)}
          </span>
        </div>
      );
    };

    const SanctionsBlock = ({ amende, prison, estVictime }) => (
      <div style={{
        background: estVictime ? 'rgba(94,106,210,0.05)' : 'rgba(239,68,68,0.05)',
        border: estVictime ? '1px solid rgba(94,106,210,0.22)' : '1px solid rgba(239,68,68,0.22)',
        borderLeft: estVictime ? '3px solid #5e6ad2' : '3px solid #ef4444',
        borderRadius: 8,
        padding: '18px 22px',
      }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: estVictime ? '#7170ff' : '#ef4444', textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 14, fontFeatureSettings: '"cv01","ss03"' }}>
          {estVictime ? '⚖ Sanctions risquées par le coupable' : '⚠ Sanctions encourues'}
        </div>
        <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
          {amende && (
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: 'rgba(239,68,68,0.65)', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>Amende maximale</div>
              <div style={{ fontSize: 30, fontWeight: 700, color: '#ef4444', letterSpacing: '-0.8px', lineHeight: 1, fontFeatureSettings: '"cv01","ss03"' }}>−{amende}</div>
            </div>
          )}
          {prison && (
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: 'rgba(239,68,68,0.65)', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>Emprisonnement</div>
              <div style={{ fontSize: 30, fontWeight: 700, color: '#ef4444', letterSpacing: '-0.8px', lineHeight: 1, fontFeatureSettings: '"cv01","ss03"' }}>{prison}</div>
            </div>
          )}
        </div>
      </div>
    );

    const LawBlock = ({ code, title, excerpt, link }) => {
      const [open, setOpen] = React.useState(false);
      return (
        <div style={{
          background: 'var(--bg-panel)',
          border: '1px solid var(--border-default)',
          borderLeft: '2px solid #5e6ad2',
          borderRadius: 6,
          padding: '12px 16px',
          fontFamily: '"Berkeley Mono", ui-monospace, "SF Mono", Menlo, monospace',
        }}>
          <div style={{ fontSize: 13, fontWeight: 590, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"', marginBottom: 8 }}>
            {title ? `${code} — ${title}` : code}
          </div>
          {open && (
            <div style={{ fontSize: 13, color: 'var(--text-body)', lineHeight: 1.6, marginBottom: 8 }}>
              {excerpt}
            </div>
          )}
          <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
            <button onClick={() => setOpen(o => !o)}
              style={{ fontSize: 13, fontWeight: 510, color: '#7170ff', textDecoration: 'none', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
              {open ? 'Masquer ↑' : 'En savoir plus'}
            </button>
            {link && open && (
              <a href={link} target="_blank" rel="noopener noreferrer"
                style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-muted)', textDecoration: 'none' }}>
                Lire l'article complet →
              </a>
            )}
          </div>
        </div>
      );
    };

    const PremiumBlock = ({ title, body, cta, onCta }) => (
      <div style={{
        background: 'var(--bg-surface-elevated)',
        borderLeft: '3px solid #5e6ad2',
        borderRadius: '0 6px 6px 0',
        padding: 16,
      }}>
        <div style={{ fontSize: 11, fontWeight: 510, color: '#7170ff', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6, fontFeatureSettings: '"cv01","ss03"' }}>
          ✦ Démarche disponible
        </div>
        <div style={{ fontSize: 15, fontWeight: 590, color: 'var(--text-primary)', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>
          {title}
        </div>
        <div style={{ fontSize: 14, color: 'var(--text-muted)', marginBottom: 12, fontFeatureSettings: '"cv01","ss03"' }}>
          {body}
        </div>
        <button
          onClick={onCta || scrollToPricing}
          style={{ width: '100%', padding: '8px 16px', background: '#5e6ad2', color: '#fff', border: 'none', borderRadius: 6, fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"' }}
          onMouseEnter={e => e.target.style.background = '#828fff'}
          onMouseLeave={e => e.target.style.background = '#5e6ad2'}
        >
          {cta}
        </button>
      </div>
    );

    /* ── Navbar ─────────────────────────────────────────── */

    const Navbar = ({ page, setPage, theme, toggleTheme, onNavSection }) => (
      <nav style={{
        position: 'sticky', top: 0, zIndex: 100,
        height: 56, background: 'var(--bg-panel)',
        borderBottom: '1px solid var(--border-subtle)',
        display: 'flex', alignItems: 'center',
        padding: '0 24px', gap: 0,
      }}>
        {/* Logo */}
        <div onClick={() => setPage('landing')} style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="6" fill="#5e6ad2" />
            <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fillOpacity="0.95" />
            <circle cx="14" cy="20" r="1.5" fill="#7170ff" />
          </svg>
          <span style={{ fontSize: 16, fontWeight: 590, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"', letterSpacing: '-0.2px' }}>AvocAI</span>
        </div>

        {/* Center nav */}
        <div className="nav-center" style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 32, alignItems: 'center' }}>
          <a onClick={e => { e.preventDefault(); setPage('chat'); }} href="#"
            style={{ fontSize: 13, fontWeight: 590, textDecoration: 'none', fontFeatureSettings: '"cv01","ss03"', cursor: 'pointer', color: page === 'chat' ? '#7170ff' : 'var(--text-primary)', borderBottom: page === 'chat' ? '1px solid #7170ff' : 'none', paddingBottom: page === 'chat' ? 2 : 0 }}
            onMouseEnter={e => e.currentTarget.style.color = '#7170ff'}
            onMouseLeave={e => e.currentTarget.style.color = page === 'chat' ? '#7170ff' : 'var(--text-primary)'}
          >Chat</a>
          {[['Fonctionnalités', 'fonctionnalites'], ['Tarifs', 'tarifs'], ['FAQ', 'faq']].map(([label, id]) => (
            <a key={id} href={`#${id}`} onClick={e => {
              e.preventDefault();
              if (page === 'landing') {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
              } else {
                onNavSection(id);
              }
            }}
              style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-body)', textDecoration: 'none', fontFeatureSettings: '"cv01","ss03"' }}
              onMouseEnter={e => e.target.style.color = 'var(--text-primary)'}
              onMouseLeave={e => e.target.style.color = 'var(--text-body)'}
            >{label}</a>
          ))}
        </div>

        {/* Right buttons — toujours les mêmes */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0, marginLeft: 'auto' }}>
          {getToken() ? (
            <>
              <button className="nav-login" onClick={logout} style={{
                padding: '6px 14px', borderRadius: 6, border: '1px solid var(--btn-border)',
                background: 'var(--btn-bg)', cursor: 'pointer',
                fontSize: 14, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', color: 'var(--text-body)',
              }}>Se déconnecter</button>
              <button className="nav-try-btn" onClick={scrollToPricing}
                style={{ padding: '6px 14px', borderRadius: 6, border: 'none', background: '#5e6ad2', color: '#fff', cursor: 'pointer', fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', fontSize: 14, height: 32 }}
                onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
              >Passer à Pro</button>
            </>
          ) : (
            <>
              <button className="nav-login" onClick={() => window.location.href = '/login'} style={{
                padding: '6px 14px', borderRadius: 6, border: '1px solid var(--btn-border)',
                background: 'var(--btn-bg)', cursor: 'pointer',
                fontSize: 14, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', color: 'var(--text-body)',
              }}>Se connecter</button>
              <button className="nav-try-btn" onClick={() => window.location.href = '/register'}
                style={{ padding: '6px 14px', borderRadius: 6, border: 'none', background: '#5e6ad2', color: '#fff', cursor: 'pointer', fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', fontSize: 14, height: 32 }}
                onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
              >Essayer gratuitement</button>
            </>
          )}
        </div>

        {/* Theme toggle — fixed bottom right */}
        <button onClick={toggleTheme} style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 200,
          width: 40, height: 40, borderRadius: 9999,
          border: '1px solid var(--btn-border)',
          background: 'var(--bg-panel)',
          boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
          cursor: 'pointer', display: 'flex',
          alignItems: 'center', justifyContent: 'center',
          color: 'var(--text-muted)',
        }}>
          {theme === 'dark' ? (
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
              <circle cx="8" cy="8" r="3" />
              <line x1="8" y1="1" x2="8" y2="3" /><line x1="8" y1="13" x2="8" y2="15" />
              <line x1="1" y1="8" x2="3" y2="8" /><line x1="13" y1="8" x2="15" y2="8" />
              <line x1="3" y1="3" x2="4.5" y2="4.5" /><line x1="11.5" y1="11.5" x2="13" y2="13" />
              <line x1="13" y1="3" x2="11.5" y2="4.5" /><line x1="4.5" y1="11.5" x2="3" y2="13" />
            </svg>
          ) : (
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M13 9.5A5.5 5.5 0 016.5 3 5.5 5.5 0 1013 9.5z" />
            </svg>
          )}
        </button>
      </nav>
    );

    /* ── Landing: DemoCard ──────────────────────────────── */

    const DemoCard = ({ setPage }) => (
      <div style={{
        maxWidth: 680, margin: '56px auto 0',
        background: 'var(--bg-surface)', border: '1px solid var(--border-default)',
        borderRadius: 12, overflow: 'hidden',
        boxShadow: '0px 1px 3px rgba(0,0,0,0.06), 0px 1px 2px rgba(0,0,0,0.04)',
        textAlign: 'left',
      }}>
        <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#27a644' }} />
          <span style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-muted)', fontFeatureSettings: '"cv01","ss03"' }}>Exemple de Discussion</span>
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
            <div style={{ background: '#5e6ad2', color: '#fff', borderRadius: 8, padding: '10px 14px', maxWidth: '80%', fontSize: 15, lineHeight: 1.5, fontFeatureSettings: '"cv01","ss03"' }}>
              J'ai une altercation avec quelqu'un. J'ai besoin d'un avocat pour me défendre.
            </div>
          </div>
          <div style={{
            background: '#252529', border: '1px solid rgba(0,0,0,0.35)', borderRadius: 10, overflow: 'hidden',
            '--text-primary': '#ffffff',
            '--text-body': 'rgba(255,255,255,0.88)',
            '--text-muted': 'rgba(255,255,255,0.60)',
            '--text-subtle': 'rgba(255,255,255,0.42)',
            '--bg-panel': 'rgba(255,255,255,0.09)',
            '--bg-surface': 'rgba(255,255,255,0.07)',
            '--bg-surface-elevated': 'rgba(255,255,255,0.05)',
            '--border-default': 'rgba(255,255,255,0.14)',
            '--border-subtle': 'rgba(255,255,255,0.08)',
            '--btn-bg': 'rgba(255,255,255,0.09)',
            '--btn-border': 'rgba(255,255,255,0.14)',
          }}>
            <div style={{ padding: '10px 16px', borderBottom: '1px solid rgba(255,255,255,0.10)', display: 'flex', alignItems: 'center', gap: 6 }}>
              <svg width="14" height="14" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="4" fill="#5e6ad2" />
                <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fillOpacity="0.95" />
              </svg>
              <span style={{ fontSize: 12, fontWeight: 510, color: 'rgba(255,255,255,0.55)', textTransform: 'uppercase', letterSpacing: 0.5, fontFeatureSettings: '"cv01","ss03"' }}>Analyse juridique</span>
            </div>
            <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 12 }}>
              {/* Risk row */}
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 20 }}>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 510, color: 'rgba(255,255,255,0.42)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 5, fontFeatureSettings: '"cv01","ss03"' }}>Risque légal</div>
                  <RiskMeter level={4} />
                </div>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 510, color: 'rgba(255,255,255,0.42)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 5, fontFeatureSettings: '"cv01","ss03"' }}>Chances de poursuites</div>
                  <div style={{ fontSize: 15, fontWeight: 590, color: '#ffffff', fontFeatureSettings: '"cv01","ss03"' }}>38%</div>
                </div>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 510, color: 'rgba(255,255,255,0.42)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 5, fontFeatureSettings: '"cv01","ss03"' }}>Délai légal</div>
                  <div style={{ fontSize: 15, fontWeight: 510, color: '#f59e0b', fontFeatureSettings: '"cv01","ss03"' }}>Agissez rapidement</div>
                </div>
              </div>
              <SanctionsBlock amende="45 000 €" prison="3 ans" />
              <LawBlock code="Art. 222-11" title="Code Pénal" excerpt="Les violences ayant entraîné une incapacité totale de travail pendant plus de huit jours sont punies de trois ans d'emprisonnement et de 45 000 euros d'amende..." />
              <PremiumBlock title="Rentrez en contact avec un avocat" body="Nous vous mettons en relation avec un avocat spécialisé pour préparer votre défense." cta="Commencer la démarche →" />
            </div>
          </div>
        </div>
      </div>
    );

    /* ── Landing: Hero ──────────────────────────────────── */

    const Hero = ({ setPage, onHeroSend }) => {
      const [heroInput, setHeroInput] = React.useState('');
      const [showLoginModal, setShowLoginModal] = React.useState(false);
      const inputRef = React.useRef(null);

      const handleSubmit = () => {
        const text = heroInput.trim();
        if (!text) return;
        if (!getToken()) {
          sessionStorage.setItem('avocai_pending_message', text);
          setPage('chat');
          return;
        }
        onHeroSend(text);
        setPage('chat');
      };

      const handleKey = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSubmit();
        }
      };

      return (
        <section style={{ background: 'var(--bg-page)', padding: '72px 24px 60px', textAlign: 'center' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{ display: 'inline-block', padding: '5px 14px', borderRadius: 9999, border: '1px solid rgba(94,106,210,0.35)', marginBottom: 32, fontSize: 12, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', color: '#5e6ad2' }}>
              Gratuit — Analysez votre situation maintenant
            </div>

    /* ── Chat Interface ──────────────────────────────────── */

    const ChatInterface = ({ setPage, heroMessage, onHeroMessageConsumed }) => {
      const [messages, setMessages] = useState(() => {
        const saved = sessionStorage.getItem('avocai_guest_session');
        if (saved && getToken()) {
          try {
            sessionStorage.removeItem('avocai_guest_session');
            return JSON.parse(saved);
          } catch { return []; }
        }
        return [];
      });
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [convTitle, setConvTitle] = useState(null);
      const [convId, setConvId] = useState(null);
      const [conversations, setConversations] = useState([]);
      const [user, setUser] = useState(getStoredUser());
      const [authChecked, setAuthChecked] = useState(false);
      const [isGuest, setIsGuest] = useState(!getToken());
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [quota, setQuota] = useState(null);
      const [guestExhausted, setGuestExhausted] = useState(() => !!localStorage.getItem('avocai_guest_exhausted'));
      const bottomRef = useRef(null);
      const heroSentRef = useRef(false);

      // Auth check + initial conv load
      useEffect(() => {
        // Invité : pas de redirection, mode guest
        if (!getToken()) {
          setIsGuest(true);
          setAuthChecked(true);
          return;
        }
        (async () => {
          try {
            const meRes = await fetch('/api/auth/me', { headers: authHeaders() });
            if (!meRes.ok) { logout(); return; }
            const me = await meRes.json();
            setUser(me.user);
            localStorage.setItem('avocai_user', JSON.stringify(me.user));
            const [cRes, qRes] = await Promise.all([
              fetch('/api/conversations', { headers: authHeaders() }),
              fetch('/api/quota/status', { headers: authHeaders() }),
            ]);
            if (cRes.ok) {
              const { conversations: convs } = await cRes.json();
              setConversations(convs);
            }
            if (qRes.ok) {
              setQuota(await qRes.json());
            }
            // Import guest session as a real conversation after login
            const guestRaw = sessionStorage.getItem('avocai_guest_raw');
            if (guestRaw) {
              sessionStorage.removeItem('avocai_guest_raw');
              localStorage.removeItem('avocai_guest_exhausted');
              try {
                const { userMessage, aiResponse } = JSON.parse(guestRaw);
                const importRes = await fetch('/api/conversations/import-guest', {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                  body: JSON.stringify({ userMessage, aiResponse }),
                });
                if (importRes.ok) {
                  const { conversation_id, title } = await importRes.json();
                  setConvId(conversation_id);
                  setConvTitle(title);
                  const cRes2 = await fetch('/api/conversations', { headers: authHeaders() });
                  if (cRes2.ok) { const { conversations: convs2 } = await cRes2.json(); setConversations(convs2); }
                }
              } catch {}
            }
            setAuthChecked(true);
          } catch { logout(); }
        })();
      }, []);

      const transformAiMessage = (m) => {
        const articles = (m.articles || []).map(a => {
          const parts = (a.code || '').split('—');
          return {
            code: parts[0]?.trim() || a.code,
            title: parts[1]?.trim() || '',
            excerpt: a.texte,
            link: a.lien,
          };
        });
        return {
          role: 'ai',
          contexte: m.contexte,
          summary: m.resume,
          risk: m.risque_niveau || 3,
          probability: m.probabilite,
          delai: m.delai_legal,
          sanctions: m.sanctions || null,
          articles,
          actions: m.actions_gratuites || [],
          premium: m.demarche_disponible,
          premiumTitle: m.demarche_titre,
          premiumBody: m.demarche_description,
        };
      };

      const loadConversation = async (id) => {
        try {
          const res = await fetch('/api/conversations/' + id, { headers: authHeaders() });
          if (!res.ok) return;
          const { conversation, messages: msgs } = await res.json();
          const transformed = msgs.map(m => m.role === 'ai' ? transformAiMessage(m) : m);
          setConvId(conversation.id);
          setConvTitle(conversation.title);
          setMessages(transformed);
        } catch {}
      };

      const newConversation = () => {
        setMessages([]);
        setConvTitle(null);
        setConvId(null);
      };

      const handleSend = async (text) => {
        const msg = (text || input).trim();
        if (!msg || loading) return;

        // Invité → 1 requête via endpoint guest
        if (isGuest && !guestExhausted) {
          setInput('');
          if (!convTitle) setConvTitle(msg.length > 40 ? msg.slice(0, 40) + '…' : msg);
          const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          setMessages(prev => [...prev, { role: 'user', text: msg, time: now }]);
          setLoading(true);
          try {
            const res = await fetch('/api/chat/guest', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: msg }),
            });
            const body = await res.json();
            if (res.status === 429 || body.exhausted) {
              localStorage.setItem('avocai_guest_exhausted', '1');
              setGuestExhausted(true);
              return;
            }
            if (!res.ok) { setMessages(prev => [...prev, { role: 'error', text: body.error || 'Erreur serveur.' }]); return; }
            const articles = (body.articles || []).map(a => {
              const parts = (a.code || '').split('—');
              return { code: parts[0]?.trim() || a.code, title: parts[1]?.trim() || '', excerpt: a.texte, link: a.lien };
            });
            setMessages(prev => [...prev, {
              role: 'ai', time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
              contexte: body.contexte, summary: body.resume, risk: body.risque_niveau || 3,
              probability: body.probabilite, delai: body.delai_legal, sanctions: body.sanctions || null,
              articles, actions: body.actions_gratuites || [],
              premium: body.demarche_disponible, premiumTitle: body.demarche_titre, premiumBody: body.demarche_description,
            }]);
            sessionStorage.setItem('avocai_guest_raw', JSON.stringify({ userMessage: msg, aiResponse: body }));
            localStorage.setItem('avocai_guest_exhausted', '1');
            setGuestExhausted(true);
          } catch (err) {
            setMessages(prev => [...prev, { role: 'error', text: err.message }]);
          } finally { setLoading(false); }
          return;
        }

        // Invité sans pass → sauvegarder le message + modale de connexion
        if (isGuest) {
          sessionStorage.setItem('avocai_pending_message', msg);
          setShowLoginModal(true);
          return;
        }

        setInput('');
        if (!convTitle) setConvTitle(msg.length > 40 ? msg.slice(0, 40) + '…' : msg);

        const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        const userMsg = { role: 'user', text: msg, time: now };
        setMessages(prev => [...prev, userMsg]);
        setLoading(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ message: msg, conversation_id: convId }),
          });
          if (res.status === 401) { logout(); return; }

          // Quota dépassé
          if (res.status === 429) {
            const body = await res.json();
            setQuota(prev => prev ? { ...prev, used: prev.limit, remaining: 0 } : null);
            setMessages(prev => [...prev, { role: 'quota', quota: body.quota, text: body.error }]);
            return;
          }

          if (!res.ok) {
            let errMsg = `Erreur serveur (${res.status})`;
            try { const body = await res.json(); if (body.error) errMsg = body.error; } catch {}
            throw new Error(errMsg);
          }
          const data = await res.json();

          if (data.conversation_id && !convId) {
            setConvId(data.conversation_id);
            try {
              const cRes = await fetch('/api/conversations', { headers: authHeaders() });
              if (cRes.ok) { const { conversations: convs } = await cRes.json(); setConversations(convs); }
            } catch {}
          }

          // Mettre à jour le quota affiché
          if (data.quota) {
            setQuota(prev => prev
              ? { ...prev, used: data.quota.used, remaining: Math.max(0, prev.limit - data.quota.used) }
              : null
            );
          }

          const articles = (data.articles || []).map(a => {
            const parts = (a.code || '').split('—');
            return {
              code: parts[0]?.trim() || a.code,
              title: parts[1]?.trim() || '',
              excerpt: a.texte,
              link: a.lien,
            };
          });

          const aiMsg = {
            role: 'ai',
            time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
            contexte: data.contexte,
            summary: data.resume,
            risk: data.risque_niveau || 3,
            probability: data.probabilite,
            delai: data.delai_legal,
            sanctions: data.sanctions || null,
            articles,
            actions: data.actions_gratuites || [],
            premium: data.demarche_disponible,
            premiumTitle: data.demarche_titre,
            premiumBody: data.demarche_description,
          };
          setMessages(prev => [...prev, aiMsg]);
        } catch (err) {
          const errorMsg = {
            role: 'error',
            text: err.message.includes('fetch')
              ? "Impossible de contacter le serveur. Vérifiez que le serveur est démarré avec npm start."
              : err.message,
          };
          setMessages(prev => [...prev, errorMsg]);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      useEffect(() => {
        if (authChecked && heroMessage && !heroSentRef.current) {
          heroSentRef.current = true;
          onHeroMessageConsumed?.();
          handleSend(heroMessage);
        }
      }, [authChecked, heroMessage]);

      // Déclenche le flou dès qu'un invité reçoit une réponse IA (sécurité)
      useEffect(() => {
        if (isGuest && !guestExhausted && messages.some(m => m.role === 'ai')) {
          localStorage.setItem('avocai_guest_exhausted', '1');
          setGuestExhausted(true);
        }
      }, [messages]);

      useEffect(() => {
        if (authChecked) {
          const pending = sessionStorage.getItem('avocai_pending_message');
          if (pending) {
            sessionStorage.removeItem('avocai_pending_message');
            handleSend(pending);
          }
        }
      }, [authChecked]);

      return (
        <div style={{ display: 'flex', height: 'calc(100vh - 56px)', overflow: 'hidden' }}>
          {/* Modale invité */}
          {showLoginModal && (
            <LoginModal
              onClose={() => setShowLoginModal(false)}
              onContinueAsGuest={() => {
                localStorage.setItem('avocai_guest_allowed', '1');
                setShowLoginModal(false);
                if (input.trim()) handleSend(input.trim());
              }}
            />
          )}

          {/* Sidebar */}
          {sidebarOpen && (
            <aside style={{ width: 260, flexShrink: 0, background: 'var(--bg-panel)', borderRight: '1px solid var(--border-subtle)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              <div style={{ padding: 12 }}>
                <button onClick={newConversation}
                  style={{ width: '100%', padding: '8px 16px', background: '#5e6ad2', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}
                  onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                  onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
                >
                  <span style={{ fontSize: 16 }}>+</span> Nouvelle analyse
                </button>
              </div>

              {/* Conv list — invité ou connecté */}
              <div style={{ flex: 1, overflowY: 'auto', padding: '4px 8px' }}>
                {isGuest ? (
                  <div style={{ padding: '20px 12px', textAlign: 'center' }}>
                    <div style={{ fontSize: 13, color: 'var(--text-subtle)', lineHeight: 1.6, marginBottom: 12, fontFeatureSettings: '"cv01","ss03"' }}>
                      Connectez-vous pour sauvegarder vos analyses.
                    </div>
                    <button onClick={() => setShowLoginModal(true)} style={{
                      width: '100%', padding: '8px 12px', borderRadius: 6,
                      border: '1px solid #5e6ad2', background: 'transparent',
                      color: '#7170ff', fontSize: 13, fontWeight: 510,
                      cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"',
                    }}>Se connecter</button>
                  </div>
                ) : (
                  <>
                    {conversations.length > 0 && (
                      <div style={{ fontSize: 11, fontWeight: 510, color: 'var(--text-subtle)', textTransform: 'uppercase', letterSpacing: 0.5, padding: '8px 8px 4px', fontFeatureSettings: '"cv01","ss03"' }}>Récent</div>
                    )}
                    {conversations.map(c => (
                      <div key={c.id} onClick={() => loadConversation(c.id)}
                        style={{
                          padding: '9px 10px', borderRadius: 6, marginBottom: 2, cursor: 'pointer',
                          background: c.id === convId ? 'var(--bg-surface)' : 'transparent',
                          borderLeft: c.id === convId ? '2px solid #5e6ad2' : '2px solid transparent',
                        }}
                        onMouseEnter={e => { if (c.id !== convId) e.currentTarget.style.background = 'var(--bg-surface)'; }}
                        onMouseLeave={e => { if (c.id !== convId) e.currentTarget.style.background = 'transparent'; }}
                      >
                        <div style={{ fontSize: 14, fontWeight: 400, color: 'var(--text-body)', fontFeatureSettings: '"cv01","ss03"', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.title || 'Sans titre'}</div>
                      </div>
                    ))}
                  </>
                )}
              </div>

              {/* Quota bar (utilisateurs connectés seulement) */}
              {!isGuest && <QuotaBar quota={quota} />}

              {/* User area */}
              {!isGuest ? (
                <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 30, height: 30, borderRadius: '50%', background: '#5e6ad2', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <span style={{ fontSize: 13, fontWeight: 510, color: '#fff' }}>{(user?.firstName || user?.email || '?')[0].toUpperCase()}</span>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {user?.firstName && user?.lastName ? `${user.firstName} ${user.lastName}` : user?.email || '—'}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text-subtle)', fontFeatureSettings: '"cv01","ss03"' }}>Plan {user?.plan === 'pro' ? 'Premium ✦' : user?.plan === 'pro_plus' ? 'Premium+ ✦' : 'Gratuit'}</div>
                  </div>
                  <button onClick={logout} title="Se déconnecter"
                    style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 14, padding: 4 }}
                    onMouseEnter={e => e.currentTarget.style.color = 'var(--text-primary)'}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}
                  >⏻</button>
                </div>
              ) : (
                <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border-subtle)', textAlign: 'center' }}>
                  <span style={{ fontSize: 12, color: 'var(--text-subtle)', fontFeatureSettings: '"cv01","ss03"' }}>Mode invité</span>
                </div>
              )}
            </aside>
          )}

          {/* Main chat area */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--bg-page)' }}>
            {/* Chat header */}
            <div style={{ height: 48, borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', padding: '0 16px', gap: 12, flexShrink: 0 }}>
              <button onClick={() => setSidebarOpen(o => !o)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 18, padding: 4 }}>☰</button>
              <span style={{ fontSize: 15, fontWeight: 510, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"' }}>
                {convTitle || 'Nouvelle analyse'}
              </span>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '24px 24px 8px', position: 'relative' }}>
              {messages.length === 0 ? (
                <EmptyState onSuggestion={handleSend} />
              ) : (
                <div style={{ maxWidth: 780, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 20 }}>
                  {messages.map((msg, i) => (
                    <div key={i} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }}>
                      {msg.role === 'user' ? (
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, maxWidth: '70%' }}>
                          <div style={{ background: '#5e6ad2', color: '#fff', borderRadius: 8, padding: '10px 14px', width: 'fit-content', fontSize: 15, lineHeight: 1.5, fontFeatureSettings: '"cv01","ss03"' }}>
                            {msg.text}
                          </div>
                          {msg.time && <span style={{ fontSize: 11, color: 'var(--text-subtle)', fontFeatureSettings: '"cv01","ss03"' }}>{msg.time}</span>}
                        </div>
                      ) : msg.role === 'error' ? (
                        <ErrorCard message={msg.text} />
                      ) : msg.role === 'quota' ? (
                        <div style={{ maxWidth: '88%' }}>
                          <div style={{ background: 'rgba(239,68,68,0.06)', border: '1px solid rgba(239,68,68,0.25)', borderRadius: 12, padding: '18px 22px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                              <span style={{ fontSize: 18 }}>⏱</span>
                              <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"' }}>Quota journalier atteint</span>
                            </div>
                            <p style={{ fontSize: 14, color: 'var(--text-muted)', margin: '0 0 14px', lineHeight: 1.5, fontFeatureSettings: '"cv01","ss03"' }}>
                              Vous avez utilisé vos {msg.quota?.limit || 5} analyses gratuites d'aujourd'hui.
                              Le compteur se remet à zéro à minuit UTC.
                            </p>
                            <button onClick={scrollToPricing} style={{
                              padding: '8px 18px', background: '#5e6ad2', color: '#fff', border: 'none',
                              borderRadius: 6, fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"',
                            }}
                              onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                              onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
                            >
                              Passer à Premium — +100 analyses/jour
                            </button>
                          </div>
                        </div>
                      ) : (
                        <AIMessageCard msg={msg} />
                      )}
                    </div>
                  ))}
                  {loading && (
                    <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
                      <LoadingCard />
                    </div>
                  )}
                  <div ref={bottomRef} />
                </div>
              )}

              {/* Overlay flou — position absolute après le contenu, ne pousse rien */}
              {isGuest && guestExhausted && messages.length > 0 && (() => {
                const saveAndGo = (url) => {
                  sessionStorage.setItem('avocai_guest_session', JSON.stringify(messages));
                  window.location.href = url;
                };
                return (
                  <div style={{
                    position: 'absolute', inset: 0,
                    background: 'linear-gradient(to bottom, transparent 0%, rgba(8,9,10,0.88) 35%, rgba(8,9,10,0.98) 100%)',
                    backdropFilter: 'blur(3px)',
                    display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
                    paddingBottom: 40, zIndex: 10,
                  }}>
                    <div style={{
                      background: '#16171a', border: '1px solid rgba(94,106,210,0.35)',
                      borderRadius: 14, padding: '32px 40px', textAlign: 'center',
                      maxWidth: 400, width: '100%', boxShadow: '0 24px 64px rgba(0,0,0,0.6)',
                    }}>
                      <div style={{ width: 44, height: 44, borderRadius: 10, background: '#5e6ad2', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
                          <rect width="28" height="28" rx="4" fill="#5e6ad2"/>
                          <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fillOpacity="0.95"/>
                        </svg>
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 590, color: '#f7f8f8', marginBottom: 8, fontFeatureSettings: '"cv01","ss03"' }}>
                        Continuez avec un compte gratuit
                      </div>
                      <div style={{ fontSize: 14, color: '#8a8f98', lineHeight: 1.6, marginBottom: 24, fontFeatureSettings: '"cv01","ss03"' }}>
                        Obtenez <strong style={{ color: '#d0d6e0' }}>5 analyses par jour</strong>, sauvegardez vos conversations et accédez à votre historique.
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <button onClick={() => saveAndGo('/register')}
                          style={{ width: '100%', padding: '11px 0', borderRadius: 8, border: 'none', background: '#5e6ad2', color: '#fff', fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"' }}
                          onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                          onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
                        >Créer un compte gratuit</button>
                        <button onClick={() => saveAndGo('/login')}
                          style={{ width: '100%', padding: '11px 0', borderRadius: 8, border: '1px solid rgba(255,255,255,0.12)', background: 'transparent', color: '#d0d6e0', fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"' }}
                        >Se connecter</button>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Mur invité épuisé */}
            {isGuest && guestExhausted && (
              <div style={{ flexShrink: 0, padding: '16px 24px', borderTop: '1px solid var(--border-subtle)', background: 'var(--bg-page)' }}>
                <div style={{ maxWidth: 780, margin: '0 auto', background: '#16171a', border: '1px solid rgba(94,106,210,0.35)', borderRadius: 10, padding: '18px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20, flexWrap: 'wrap' }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 590, color: '#f7f8f8', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>
                      Vous avez utilisé votre analyse gratuite
                    </div>
                    <div style={{ fontSize: 13, color: '#8a8f98', fontFeatureSettings: '"cv01","ss03"' }}>
                      Créez un compte gratuit pour obtenir <strong style={{ color: '#d0d6e0' }}>5 analyses par jour</strong>.
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 10, flexShrink: 0 }}>
                    <button onClick={() => window.location.href = '/register'} style={{ padding: '9px 18px', borderRadius: 7, border: 'none', background: '#5e6ad2', color: '#fff', fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"' }}
                      onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                      onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
                    >Créer un compte gratuit</button>
                    <button onClick={() => window.location.href = '/login'} style={{ padding: '9px 18px', borderRadius: 7, border: '1px solid rgba(255,255,255,0.12)', background: 'transparent', color: '#d0d6e0', fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"' }}>
                      Se connecter
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Input bar */}
            {!(isGuest && guestExhausted) && (
            <div style={{ flexShrink: 0, padding: '12px 24px 16px', borderTop: '1px solid var(--border-subtle)', background: 'var(--bg-page)' }}>
              <div style={{ maxWidth: 780, margin: '0 auto' }}>
                <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
                  <textarea
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                    placeholder="Décrivez votre situation..."
                    rows={1}
                    disabled={loading}
                    style={{
                      flex: 1, padding: '10px 14px',
                      background: 'var(--bg-surface)',
                      border: '1px solid var(--border-default)',
                      borderRadius: 8, resize: 'none',
                      fontSize: 15, color: 'var(--text-primary)',
                      fontFamily: 'Inter Variable, Inter, sans-serif',
                      fontFeatureSettings: '"cv01","ss03"',
                      outline: 'none', lineHeight: 1.5,
                      maxHeight: 120, overflowY: 'auto',
                      opacity: loading ? 0.6 : 1,
                    }}
                    onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
                  />
                  <button onClick={() => handleSend()} disabled={loading}
                    style={{ width: 40, height: 40, borderRadius: 6, border: 'none', background: loading ? '#9aa2e8' : '#5e6ad2', color: '#fff', cursor: loading ? 'default' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}
                    onMouseEnter={e => { if (!loading) e.currentTarget.style.background = '#828fff'; }}
                    onMouseLeave={e => { if (!loading) e.currentTarget.style.background = '#5e6ad2'; }}
                  >
                    {loading ? (
                      <div style={{ width: 14, height: 14, borderRadius: '50%', border: '2px solid rgba(255,255,255,0.4)', borderTopColor: '#fff', animation: 'spin 0.8s linear infinite' }} />
                    ) : (
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8H14M14 8L9 3M14 8L9 13" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                    )}
                  </button>
                </div>
                <p style={{ fontSize: 12, color: 'var(--text-subtle)', textAlign: 'center', marginTop: 8, fontFeatureSettings: '"cv01","ss03"' }}>
                  {isGuest
                    ? <span>
                        <button onClick={() => setShowLoginModal(true)} style={{ background: 'none', border: 'none', color: '#7170ff', cursor: 'pointer', fontSize: 12, fontWeight: 510, padding: 0, fontFeatureSettings: '"cv01","ss03"' }}>Connectez-vous</button>
                        {' '}pour sauvegarder vos analyses · AvocAI ne remplace pas un avocat
                      </span>
                    : 'AvocAI ne remplace pas un avocat · Informations basées sur le droit français'
                  }
                </p>
              </div>
            </div>
            )}
          </div>
        </div>
      );
    };

    /* ── App root ────────────────────────────────────────── */

    const App = () => {
      const [page, setPage] = useState(() =>
        getToken() && (sessionStorage.getItem('avocai_pending_message') || sessionStorage.getItem('avocai_guest_session')) ? 'chat' : 'landing'
      );
      const [theme, setTheme] = useState(() => localStorage.getItem('avocai_theme') || 'dark');
      const [heroMessage, setHeroMessage] = useState(null);
      const [scrollTarget, setScrollTarget] = useState(null);

      useEffect(() => {
        if (page === 'landing' && scrollTarget) {
          const id = scrollTarget;
          setScrollTarget(null);
          setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }), 80);
        }
      }, [page, scrollTarget]);

      const toggleTheme = () => {
        const next = theme === 'light' ? 'dark' : 'light';
        setTheme(next);
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('avocai_theme', next);
      };

      const handleHeroSend = (text) => {
        setHeroMessage(text);
      };

      return (
        <div>
          <Navbar page={page} setPage={setPage} theme={theme} toggleTheme={toggleTheme} onNavSection={id => { setScrollTarget(id); setPage('landing'); }} />
          {page === 'landing'
            ? <LandingPage setPage={setPage} onHeroSend={handleHeroSend} />
            : <ChatInterface setPage={setPage} heroMessage={heroMessage} onHeroMessageConsumed={() => setHeroMessage(null)} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
