    /* ── Autocomplete générique (Portal-based) ─────────── */

    const Autocomplete = ({ value, onChange, placeholder, fetchFn, formatLabel, formatHint, inputStyle, minChars = 1 }) => {
      const [suggestions, setSuggestions] = useState([]);
      const [open, setOpen] = useState(false);
      const [query, setQuery] = useState(value || '');
      const [rect, setRect] = useState(null);
      const debounceRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => { setQuery(value || ''); }, [value]);

      const updateRect = () => {
        if (!inputRef.current) return;
        const r = inputRef.current.getBoundingClientRect();
        setRect({ left: r.left, top: r.bottom + 4, width: r.width });
      };

      useEffect(() => {
        if (!open) return;
        updateRect();
        const onScroll = () => updateRect();
        window.addEventListener('scroll', onScroll, true);
        window.addEventListener('resize', onScroll);
        return () => { window.removeEventListener('scroll', onScroll, true); window.removeEventListener('resize', onScroll); };
      }, [open]);

      const runFetch = q => {
        clearTimeout(debounceRef.current);
        if (q.length < minChars) { setSuggestions([]); setOpen(false); return; }
        debounceRef.current = setTimeout(async () => {
          try {
            const results = await fetchFn(q);
            const arr = Array.isArray(results) ? results : [];
            setSuggestions(arr);
            setOpen(arr.length > 0);
            if (arr.length > 0) updateRect();
          } catch { setSuggestions([]); setOpen(false); }
        }, 180);
      };

      const handleInput = e => { const v = e.target.value; setQuery(v); onChange(v); runFetch(v); };

      const select = item => {
        const label = formatLabel(item);
        setQuery(label);
        onChange(label);
        setSuggestions([]);
        setOpen(false);
      };

      useEffect(() => {
        const handler = e => {
          if (inputRef.current && inputRef.current.contains(e.target)) return;
          if (e.target.closest && e.target.closest('[data-autocomplete-dropdown]')) return;
          setOpen(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      return (
        <>
          <input
            ref={inputRef}
            value={query}
            onChange={handleInput}
            onFocus={e => { e.target.style.borderColor='#5e6ad2'; updateRect(); if (suggestions.length) setOpen(true); else if (query.length >= minChars) runFetch(query); }}
            onBlur={e => e.target.style.borderColor='var(--border-default)'}
            placeholder={placeholder}
            autoComplete="off"
            style={{ width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid var(--border-default)', background:'var(--bg-input,var(--bg-panel))', color:'var(--text-primary)', fontSize:14, outline:'none', boxSizing:'border-box', ...(inputStyle||{}) }}
          />
          {open && suggestions.length > 0 && rect && ReactDOM.createPortal(
            <div data-autocomplete-dropdown
              style={{ position:'fixed', top: rect.top, left: rect.left, width: rect.width, zIndex:9999, background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:8, overflow:'hidden', boxShadow:'0 12px 32px rgba(0,0,0,0.5)', maxHeight:280, overflowY:'auto' }}>
              {suggestions.map((item, i) => (
                <div key={i}
                  onMouseDown={e => { e.preventDefault(); select(item); }}
                  style={{ padding:'10px 14px', cursor:'pointer', borderBottom: i<suggestions.length-1?'1px solid var(--border-subtle)':'none', fontSize:13, color:'var(--text-primary)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:10, transition:'background 0.1s' }}
                  onMouseEnter={e => e.currentTarget.style.background='rgba(94,106,210,0.12)'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}
                >
                  <span style={{ fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1 }}>{formatLabel(item)}</span>
                  {formatHint && <span style={{ fontSize:11, color:'var(--text-muted)', flexShrink:0 }}>{formatHint(item)}</span>}
                </div>
              ))}
            </div>,
            document.body
          )}
        </>
      );
    };

    /* ── Données statiques pour autocomplete ─────────── */

    const NATIONALITIES = ['Française','Algérienne','Marocaine','Tunisienne','Italienne','Espagnole','Portugaise','Allemande','Belge','Suisse','Britannique','Roumaine','Polonaise','Sénégalaise','Ivoirienne','Camerounaise','Malienne','Turque','Chinoise','Vietnamienne','Russe','Ukrainienne','Américaine','Canadienne','Brésilienne','Argentine','Mexicaine','Indienne','Pakistanaise','Bangladaise','Sri-lankaise','Japonaise','Coréenne','Thaïlandaise','Philippine','Indonésienne','Malgache','Comorienne','Mauritanienne','Nigériane','Ghanéenne','Éthiopienne','Égyptienne','Libanaise','Syrienne','Irakienne','Iranienne','Afghane','Israélienne','Jordanienne','Saoudienne','Émiratie','Australienne','Néerlandaise','Suédoise','Norvégienne','Danoise','Finlandaise','Grecque','Bulgare','Hongroise','Tchèque','Slovaque','Slovène','Croate','Serbe','Bosnienne','Albanaise','Autrichienne','Irlandaise','Luxembourgeoise','Monégasque','Andorrane','Apatride'];

    const PROFESSIONS = ['Salarié(e)','Cadre','Cadre supérieur(e)','Employé(e)','Ouvrier/Ouvrière','Technicien(ne)','Agent de maîtrise','Fonctionnaire','Indépendant(e)','Auto-entrepreneur','Profession libérale','Étudiant(e)','Apprenti(e)','Stagiaire','Retraité(e)','Sans emploi','En recherche d\'emploi','Intérimaire','Artisan','Commerçant(e)','Chef d\'entreprise','Dirigeant(e)','Enseignant(e)','Professeur(e)','Médecin','Infirmier/Infirmière','Aide-soignant(e)','Avocat(e)','Notaire','Huissier','Magistrat(e)','Ingénieur(e)','Développeur/Développeuse','Architecte','Comptable','Expert-comptable','Gestionnaire','Commercial(e)','Vendeur/Vendeuse','Caissier(e)','Serveur/Serveuse','Cuisinier/Cuisinière','Boulanger/Boulangère','Coiffeur/Coiffeuse','Esthéticien(ne)','Chauffeur (taxi/VTC/poids lourd)','Livreur/Livreuse','Agriculteur/Agricultrice','Maçon','Plombier','Électricien(ne)','Mécanicien(ne)','Menuisier','Peintre','Femme/Homme au foyer','Bénévole','Militaire','Policier(e)','Gendarme','Pompier','Journaliste','Photographe','Artiste','Musicien(ne)'];

    /* ── Fetchers spécifiques ──────────────────────── */

    const fetchCommunes = async q => {
      const r = await fetch(`https://geo.api.gouv.fr/communes?nom=${encodeURIComponent(q)}&boost=population&limit=8&fields=nom,codesPostaux,departement`);
      return r.ok ? await r.json() : [];
    };

    const fetchAddresses = async q => {
      const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=6`);
      if (!r.ok) return [];
      const d = await r.json();
      return (d.features || []).map(f => f.properties);
    };

    const filterStatic = list => async q => {
      const lq = q.toLowerCase();
      return list.filter(item => item.toLowerCase().includes(lq)).slice(0, 8).map(name => ({ name }));
    };

    /* ── CommuneAutocomplete (wrapper pour usage existant) ─ */

    const CommuneAutocomplete = ({ value, onChange, placeholder, inputStyle }) => (
      <Autocomplete
        value={value} onChange={onChange} placeholder={placeholder || 'Rechercher une commune…'}

    /* ── LawyerMatchModal ───────────────────────────────── */

    const CAT_SPECIALTY = {
      travail:'Droit du travail', locatif:'Droit immobilier',
      consommation:'Droit de la consommation', routier:'Droit routier',
      demeure:'Recouvrement de créances', famille:'Droit de la famille',

      const [confirming, setConfirming] = useState(null);   // index en attente de confirm

      const specialty = CAT_SPECIALTY[formData?.category] || 'Droit général';

      const hashScore = s => {
        let h = 5381;
        for (let i = 0; i < s.length; i++) h = (h * 33 + s.charCodeAt(i)) & 0xffffffff;
        return 55 + (Math.abs(h) % 40); // 55–94%
      };

      useEffect(() => {
        (async () => {
          try {
            // 1. Géocode l'adresse
            const addr = (formData?.lawyerCity || formData?.address || '') + ', France';
            const geoR = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`);
            const geoD = await geoR.json();
            if (!geoD.length) { setStatus('error'); return; }
            const lat = parseFloat(geoD[0].lat), lon = parseFloat(geoD[0].lon);

            // 2. Overpass
            const q = `[out:json][timeout:25];(node["office"="lawyer"](around:25000,${lat},${lon});way["office"="lawyer"](around:25000,${lat},${lon});node["amenity"="lawyer"](around:25000,${lat},${lon}););out center 25;`;
            const ovR = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
            const ovD = await ovR.json();

            // 3. Photos réalistes
            // 4. Process
            const parsed = (ovD.elements || [])
              .map(el => {
                const t = el.tags || {};
                const eLat = el.lat ?? el.center?.lat, eLon = el.lon ?? el.center?.lon;
                return {
                  name:    t.name || null,
                  address: [t['addr:housenumber'], t['addr:street'], t['addr:postcode'], t['addr:city']].filter(Boolean).join(' '),
                  phone:   t.phone || t['contact:phone'] || null,
                  website: t.website || t['contact:website'] || null,
                  dist:    (eLat && eLon) ? haversineKm(lat, lon, eLat, eLon) : null,
                };
              })
              .filter(l => l.name)
              .sort((a, b) => (a.dist ?? 99) - (b.dist ?? 99))
              .slice(0, 8);

            setLawyers(parsed);
            setStatus(parsed.length ? 'results' : 'empty');

        })();
      }, []);

      const MatchBar = ({ score }) => (

          </div>
        </div>

      return (
        <div style={{position:'fixed', inset:0, zIndex:950, background:'rgba(0,0,0,0.7)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16}}

            {/* Header */}

                <div style={{display:'flex', gap:8, alignItems:'center'}}>

                </div>

              {status==='loading' && (
                <div style={{textAlign:'center', padding:'48px 0'}}>
                  <div style={{width:44, height:44, borderRadius:'50%', border:'3px solid var(--border-default)', borderTopColor:'#5e6ad2', animation:'spin 0.9s linear infinite', margin:'0 auto 20px'}}/>

              )}

                <div style={{display:'flex', flexDirection:'column', gap:14}}>
                  {lawyers.map((l, i) => {
                    const score = hashScore(l.name + (formData?.category||''));

                    return (
                      <div key={i} style={{background:'var(--bg-card,var(--bg-subtle))', border:'1px solid var(--border-default)', borderRadius:14, overflow:'hidden'}}>

                          <div style={{display:'flex', gap:14, alignItems:'flex-start', marginBottom:14}}>
                            {/* Photo */}

                            {l.phone ? <a href={`tel:${l.phone}`} style={{fontSize:13, color:'#5e6ad2', textDecoration:'none', display:'flex', gap:6, alignItems:'center'}}>📞 {l.phone}</a>

                        {/* Confirmation inline */}
                        {isConfirming && !isSent && (
                          <div style={{borderTop:'1px solid rgba(94,106,210,0.3)', padding:'14px 18px', background:'rgba(94,106,210,0.06)'}}>
                            <div style={{fontSize:13, fontWeight:600, color:'var(--text-primary)', marginBottom:6}}>Êtes-vous sûr de vouloir contacter cet avocat avec votre dossier ?</div>
                            <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:14, lineHeight:1.6}}>
                              La réponse sera envoyée à l'adresse :<br/>

                            <div style={{fontSize:13, color:'var(--text-body)', lineHeight:1.6}}>

      );
    };

    /* ── LawyerSearchModal ──────────────────────────────── */

    const haversineKm = (lat1, lon1, lat2, lon2) => {
      const R = 6371, toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    };

    const LawyerSearchModal = ({ onClose }) => {
      const [status, setStatus]     = useState('idle'); // idle | locating | searching | results | error
      const [lawyers, setLawyers]   = useState([]);
      const [cityInput, setCityInput] = useState('');
      const [coords, setCoords]     = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      const processResults = (elements, lat, lon) => {
        const parsed = elements
          .map(el => {
            const t = el.tags || {};
            const elLat = el.lat ?? el.center?.lat;
            const elLon = el.lon ?? el.center?.lon;
            return {
              name:      t.name || t['name:fr'] || 'Cabinet d\'avocat',
              address:   [t['addr:housenumber'], t['addr:street'], t['addr:postcode'], t['addr:city']].filter(Boolean).join(' '),
              phone:     t.phone || t['contact:phone'] || null,
              website:   t.website || t['contact:website'] || null,
              specialty: t.description || t.speciality || t['legal:type'] || null,
              dist:      (elLat && elLon) ? haversineKm(lat, lon, elLat, elLon) : null,
            };
          })
          .filter(l => l.name !== 'Cabinet d\'avocat' || l.address)
          .sort((a, b) => (a.dist ?? 99) - (b.dist ?? 99))
          .slice(0, 15);
        setLawyers(parsed);
        setStatus(parsed.length ? 'results' : 'empty');
      };

      const searchByCoords = async (lat, lon) => {
        setCoords({ lat, lon });
        setStatus('searching');
        try {
          const q = `[out:json][timeout:25];(node["office"="lawyer"](around:20000,${lat},${lon});way["office"="lawyer"](around:20000,${lat},${lon});node["amenity"="lawyer"](around:20000,${lat},${lon}););out center 30;`;
          const r = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
          const d = await r.json();
          processResults(d.elements || [], lat, lon);
        } catch { setErrorMsg('Erreur réseau. Réessayez.'); setStatus('error'); }
      };

      const geolocate = () => {
        if (!navigator.geolocation) { setErrorMsg('Géolocalisation non supportée.'); setStatus('error'); return; }
        setStatus('locating');
        navigator.geolocation.getCurrentPosition(
          pos => searchByCoords(pos.coords.latitude, pos.coords.longitude),
          ()  => { setErrorMsg('Localisation refusée. Entrez votre ville manuellement.'); setStatus('idle'); }
        );
      };

      const searchByCity = async () => {
        if (!cityInput.trim()) return;
        setStatus('locating');
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityInput.trim()+', France')}&format=json&limit=1`);
          const d = await r.json();
          if (!d.length) { setErrorMsg('Ville introuvable. Vérifiez l\'orthographe.'); setStatus('error'); return; }
          searchByCoords(parseFloat(d[0].lat), parseFloat(d[0].lon));
        } catch { setErrorMsg('Erreur réseau.'); setStatus('error'); }
      };

      const btnStyle = { padding:'11px 20px', borderRadius:8, border:'none', background:'#5e6ad2', color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer' };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:900, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:18, width:'100%', maxWidth:580, maxHeight:'88vh', display:'flex', flexDirection:'column', overflow:'hidden' }}>

            {/* Header */}
            <div style={{ padding:'20px 24px 16px', borderBottom:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
              <div>
                <div style={{ fontSize:18, fontWeight:600, color:'var(--text-primary)' }}>👨‍⚖️ Trouver un avocat</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>Avocats à proximité de votre position</div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:20, cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>

            {/* Body */}
            <div style={{ flex:1, overflowY:'auto', padding:'20px 24px' }}>

              {/* Idle — choix localisation */}
              {(status==='idle' || status==='error') && (
                <div style={{ textAlign:'center' }}>
                  {status==='error' && <div style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:8, padding:'10px 14px', marginBottom:20, fontSize:13, color:'#f87171' }}>{errorMsg}</div>}
                  <div style={{ fontSize:48, marginBottom:16 }}>📍</div>
                  <p style={{ fontSize:15, color:'var(--text-body)', marginBottom:24, lineHeight:1.6 }}>
                    Autorisez la géolocalisation ou entrez votre ville pour trouver les avocats proches de vous.
                  </p>
                  <button onClick={geolocate} style={{ ...btnStyle, width:'100%', marginBottom:14, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9" opacity=".3"/></svg>
                    Me localiser automatiquement
                  </button>
                  <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                    <input value={cityInput} onChange={e=>setCityInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&searchByCity()}
                      placeholder="Entrez votre ville (ex : Lyon, Bordeaux…)"
                      style={{ flex:1, padding:'10px 14px', borderRadius:8, border:'1px solid var(--border-default)', background:'var(--bg-input,var(--bg-panel))', color:'var(--text-primary)', fontSize:14, outline:'none' }}/>
                    <button onClick={searchByCity} style={{ ...btnStyle, padding:'10px 16px' }}>Chercher</button>
                  </div>
                </div>
              )}

              {/* Locating / Searching */}
              {(status==='locating'||status==='searching') && (
                <div style={{ textAlign:'center', padding:'40px 0' }}>
                  <div style={{ width:44, height:44, borderRadius:'50%', border:'3px solid var(--border-default)', borderTopColor:'#5e6ad2', animation:'spin 0.9s linear infinite', margin:'0 auto 20px' }}/>
                  <p style={{ fontSize:14, color:'var(--text-muted)' }}>{status==='locating'?'Récupération de votre position…':'Recherche des avocats à proximité…'}</p>
                </div>
              )}

              {/* Empty */}
              {status==='empty' && (
                <div style={{ textAlign:'center', padding:'32px 0' }}>
                  <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
                  <p style={{ fontSize:15, color:'var(--text-muted)', marginBottom:20 }}>Aucun cabinet trouvé dans un rayon de 20 km.<br/>Essayez avec une autre ville.</p>
                  <button onClick={()=>{setStatus('idle');setCityInput('');}} style={{ ...btnStyle, background:'transparent', border:'1px solid var(--border-default)', color:'var(--text-body)' }}>Nouvelle recherche</button>
                </div>
              )}

              {/* Results */}
              {status==='results' && (
                <>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
                    <span style={{ fontSize:13, color:'var(--text-muted)' }}>{lawyers.length} cabinet{lawyers.length>1?'s':''} trouvé{lawyers.length>1?'s':''}</span>
                    <button onClick={()=>{setStatus('idle');setLawyers([]);}} style={{ fontSize:12, color:'#7170ff', background:'none', border:'none', cursor:'pointer' }}>Modifier la recherche</button>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    {lawyers.map((l,i) => (
                      <div key={i} style={{ background:'var(--bg-card,var(--bg-subtle))', border:'1px solid var(--border-default)', borderRadius:12, padding:'16px 18px' }}>
                        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, marginBottom:6 }}>
                          <div style={{ fontSize:14, fontWeight:600, color:'var(--text-primary)' }}>{l.name}</div>
                          {l.dist!=null && <span style={{ fontSize:11, fontWeight:600, color:'#7170ff', background:'rgba(113,112,255,0.1)', padding:'2px 8px', borderRadius:9999, flexShrink:0 }}>{l.dist<1?(l.dist*1000|0)+' m':(l.dist.toFixed(1))+' km'}</span>}
                        </div>
                        {l.address && <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:6, display:'flex', gap:4, alignItems:'flex-start' }}><span>📍</span>{l.address}</div>}
                        {l.specialty && <div style={{ fontSize:12, color:'var(--text-body)', marginBottom:8, fontStyle:'italic' }}>{l.specialty}</div>}
                        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                          {l.phone && <a href={`tel:${l.phone}`} style={{ fontSize:12, color:'#5e6ad2', textDecoration:'none', display:'flex', gap:4, alignItems:'center' }}>📞 {l.phone}</a>}
                          {l.website && <a href={l.website} target="_blank" rel="noopener" style={{ fontSize:12, color:'#5e6ad2', textDecoration:'none', display:'flex', gap:4, alignItems:'center' }}>🌐 Site web</a>}
                          {!l.phone && !l.website && <span style={{ fontSize:12, color:'var(--text-muted)' }}>Coordonnées non disponibles</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}

            </div>
          </div>
        </div>
      );
    };

    /* ── DossierChat (IA modif dossier — Premium+) ─────── */

    const DossierChat = ({ dossier, onUpdate, userPlan }) => {
      const [messages, setMessages] = useState([]);
      const [input, setInput]       = useState('');
      const [sending, setSending]   = useState(false);
      const bottomRef = useRef(null);
      const isPlus = userPlan === 'pro_plus' || userPlan === 'admin';

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, sending]);

      const send = async () => {
        if (!input.trim() || sending) return;
        const userMsg = input.trim();
        setMessages(p => [...p, { role: 'user', content: userMsg }]);
        setInput('');
        setSending(true);
        try {
          const r = await fetch(`/api/dossiers/${dossier.id}/chat`, {
            method: 'POST',
            headers: { ...authHeaders(), 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userMsg, history: messages }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Erreur IA');
          setMessages(p => [...p, { role: 'ai', content: d.reply, updated: !!d.updatedData }]);
          if (d.updatedData) onUpdate(d.updatedData);
        } catch (err) {
          setMessages(p => [...p, { role: 'error', content: err.message || 'Erreur réseau' }]);
        }
        setSending(false);
      };

      if (!isPlus) {
        return (
          <div style={{ display:'flex', flexDirection:'column', height:'100%', alignItems:'center', justifyContent:'center', padding:'20px 16px', textAlign:'center' }}>
            <div style={{ fontSize:36, marginBottom:12 }}>🔒</div>
            <div style={{ fontSize:13, fontWeight:600, color:'var(--text-primary)', marginBottom:6 }}>Modification IA</div>
            <div style={{ fontSize:11, color:'var(--text-muted)', lineHeight:1.6, marginBottom:14 }}>Réservée aux abonnés <strong style={{ color:'#a78bfa' }}>Premium+</strong>.</div>
            <a href="/#tarifs" style={{ fontSize:11, color:'#7170ff', textDecoration:'none', padding:'6px 12px', borderRadius:6, border:'1px solid rgba(113,112,255,0.4)' }}>Découvrir Premium+ →</a>
          </div>
        );
      }

      return (
        <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
          {/* Header */}
          <div style={{ padding:'14px 16px', borderBottom:'1px solid var(--border-subtle)', flexShrink:0 }}>
            <div style={{ fontSize:13, fontWeight:600, color:'var(--text-primary)', display:'flex', alignItems:'center', gap:7 }}>
              <span style={{ color:'#7170ff' }}>✦</span> Assistant dossier
            </div>
            <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>Modifiez votre dossier avec l'IA</div>
          </div>

          {/* Messages */}
          <div style={{ flex:1, overflowY:'auto', padding:'14px 14px', display:'flex', flexDirection:'column', gap:10 }}>
            {messages.length === 0 && (
              <div style={{ fontSize:12, color:'var(--text-muted)', textAlign:'center', padding:'24px 8px', lineHeight:1.6 }}>
                Demandez des modifications, des reformulations ou posez des questions sur ce dossier.
                <div style={{ marginTop:14, padding:'10px 12px', background:'rgba(94,106,210,0.06)', border:'1px solid rgba(94,106,210,0.18)', borderRadius:8, fontSize:11, fontStyle:'italic', textAlign:'left', lineHeight:1.6 }}>
                  Ex : « Corrige mon adresse »<br/>« Reformule plus formel »<br/>« Ajoute un délai de 15 jours »
                </div>
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} style={{ alignSelf: m.role==='user' ? 'flex-end' : 'flex-start', maxWidth:'88%' }}>
                <div style={{
                  padding:'8px 12px', borderRadius:10, fontSize:13, lineHeight:1.55, whiteSpace:'pre-wrap',
                  background: m.role==='user' ? '#5e6ad2' : m.role==='error' ? 'rgba(239,68,68,0.12)' : 'var(--bg-surface)',
                  color: m.role==='user' ? '#fff' : m.role==='error' ? '#ef4444' : 'var(--text-body)',
                  border: m.role==='ai' ? '1px solid var(--border-default)' : 'none',
                }}>{m.content}</div>
                {m.updated && <div style={{ marginTop:4, fontSize:10, color:'#22c55e', fontWeight:600 }}>✓ Dossier mis à jour</div>}
              </div>
            ))}
            {sending && (
              <div style={{ alignSelf:'flex-start', display:'flex', gap:4, padding:'10px 12px' }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'#7170ff', animation:'bounce 1.4s infinite' }}/>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'#7170ff', animation:'bounce 1.4s infinite 0.2s' }}/>
                <div style={{ width:6, height:6, borderRadius:'50%', background:'#7170ff', animation:'bounce 1.4s infinite 0.4s' }}/>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{ padding:'10px 12px', borderTop:'1px solid var(--border-subtle)', background:'var(--bg-panel)', flexShrink:0 }}>
            <div style={{ display:'flex', gap:6, alignItems:'flex-end' }}>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}
                placeholder="Demandez une modification…" rows={2}
                style={{ flex:1, padding:'8px 10px', borderRadius:8, border:'1px solid var(--border-default)', background:'var(--bg-surface)', color:'var(--text-primary)', fontSize:13, outline:'none', resize:'none', fontFamily:'inherit', lineHeight:1.5 }}
                onFocus={e=>e.target.style.borderColor='#5e6ad2'} onBlur={e=>e.target.style.borderColor='var(--border-default)'}/>
              <button onClick={send} disabled={!input.trim() || sending}
                style={{ width:36, height:36, borderRadius:8, border:'none', background: input.trim()&&!sending?'#5e6ad2':'var(--border-default)', color: input.trim()&&!sending?'#fff':'var(--text-subtle)', cursor: input.trim()&&!sending?'pointer':'default', fontSize:18, fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                ↑
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ── Export dossier (PDF / DOC) ─────────────────────── */

    const buildDossierHtml = (data, subLabel) => {
      const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
      const esc = s => String(s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
      return `<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><title>${esc(subLabel)}</title>
<style>
body { font-family: 'Times New Roman', Georgia, serif; color:#111827; background:#fff; margin:0; padding:40px; line-height:1.7; }
.container { max-width:680px; margin:0 auto; }
.header { text-align:right; margin-bottom:36px; font-size:13px; color:#374151; line-height:1.8; }

.body { font-size:14px; line-height:2; color:#1f2937; }
.body p { margin:0 0 16px; text-align:justify; }

.pieces { margin-top:48px; padding:14px 18px; background:#f3f4f6; border-radius:8px; font-size:12px; color:#4b5563; line-height:1.8; }
.pieces strong { color:#111827; }
</style></head>
<body><div class="container">
  <div class="header">
    ${esc(data?.firstName||'')} ${esc(data?.lastName||'')}<br>
    ${esc(data?.address||'Votre adresse')}<br>
    Le ${today}
  </div>
  <div class="title">
    <h1>${esc(subLabel)}</h1>
    <div class="sub">Envoi par lettre recommandée avec accusé de réception</div>
  </div>
  <div class="body">
    <p>Madame, Monsieur,</p>
    <p>Je soussigné(e), ${esc(data?.firstName||'')} ${esc(data?.lastName||'')}, né(e) le ${esc(data?.birthDate||'…')} à ${esc(data?.birthPlace||'…')}, demeurant au ${esc(data?.address||'…')}, vous adresse la présente par lettre recommandée avec accusé de réception.</p>
    <p>En application des dispositions légales en vigueur et conformément à la jurisprudence constante, je vous mets en demeure de procéder, dans un délai de <strong>8 jours</strong> à compter de la réception des présentes, à l'exécution de vos obligations.</p>
    <p>À défaut de réponse satisfaisante dans ce délai, je me verrai dans l'obligation de saisir la juridiction compétente afin de faire valoir mes droits, et ce sans autre avertissement préalable. Des intérêts moratoires seront également exigibles conformément aux articles 1231-6 et 1231-7 du Code civil.</p>
    <p>Dans l'attente d'une réponse rapide, je reste disponible pour tout règlement amiable de ce litige.</p>
    <p>Veuillez agréer, Madame, Monsieur, l'expression de mes salutations distinguées.</p>
    <p class="signature">${esc(data?.firstName||'')} ${esc(data?.lastName||'')}</p>
  </div>
  <div class="pieces">
    <strong>Pièces justificatives recommandées :</strong><br>
    Facture / bon de commande · Échanges email · Preuve de paiement · Accusé de réception
  </div>
</div></body></html>`;
    };

    const sanitizeFilename = s => String(s||'dossier').replace(/[\\/:*?"<>|]+/g, '').replace(/\s+/g, '_').slice(0, 80) || 'dossier';

    const downloadDossierPdf = async (data, subLabel) => {
      const html = buildDossierHtml(data, subLabel);
      // Conteneur invisible pour rendre le HTML
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;';
      wrap.innerHTML = html;
      document.body.appendChild(wrap);
      try {
        await window.html2pdf().set({
          margin: [12, 12, 12, 12],
          filename: sanitizeFilename(subLabel) + '.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['css', 'legacy'] },
        }).from(wrap.querySelector('.container') || wrap).save();
      } finally { document.body.removeChild(wrap); }
    };

    const downloadDossierDoc = (data, subLabel) => {
      const html = buildDossierHtml(data, subLabel);
      // Word lit le HTML — préfixe BOM pour UTF-8
      const blob = new Blob(['﻿', html], { type: 'application/msword' });
      const url  = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = sanitizeFilename(subLabel) + '.doc';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    /* ── DossierListModal ───────────────────────────────── */

    const CAT_LABEL_MAP = {
      travail:'Droit du travail', locatif:'Droit immobilier',
      consommation:'Droit de la consommation', routier:'Droit routier',
      demeure:'Recouvrement de créances', famille:'Droit de la famille',
      penal:'Droit pénal', sante:'Droit de la santé',
      administratif:'Droit administratif', affaires:'Droit des affaires',
      contacter_avocat:'Droit général',
    };

    const DossierListModal = ({ onClose, userPlan }) => {
      const [dossiers, setDossiers]     = useState([]);
      const [loading, setLoading]       = useState(true);
      const [viewing, setViewing]       = useState(null); // { id, title, category, data, created_at }
      const [viewMode, setViewMode]     = useState('view'); // 'view' | 'edit'
      const [loadingView, setLoadingView] = useState(false);

      useEffect(() => {
        fetch('/api/dossiers', { headers: authHeaders() })
          .then(r => r.ok ? r.json() : { dossiers: [] })
          .then(d => { setDossiers(d.dossiers || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      const openDossier = async (id, mode='view') => {
        setLoadingView(true);
        setViewMode(mode);
        try {
          const r = await fetch(`/api/dossiers/${id}`, { headers: authHeaders() });
          const d = await r.json();
          setViewing(d.dossier);
        } catch {}
        setLoadingView(false);
      };

      const deleteDossier = async (id, e) => {
        e.stopPropagation();
        if (!confirm('Supprimer ce dossier définitivement ?')) return;
        await fetch(`/api/dossiers/${id}`, { method:'DELETE', headers: authHeaders() });
        setDossiers(prev => prev.filter(d => d.id !== id));
        if (viewing?.id === id) setViewing(null);
      };

      // ── Vue document avec chat IA à gauche ──
      if (viewing) {
        const subLabel = viewing.title;
        return (
          <div style={{ position:'fixed', inset:0, zIndex:700, background:'var(--bg-page)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
            {/* Header */}
            <div style={{ height:52, background:'var(--bg-panel)', borderBottom:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', padding:'0 24px', gap:12, flexShrink:0 }}>
              <button onClick={() => setViewing(null)} style={{ background:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:13, padding:'5px 10px', borderRadius:6, border:'1px solid var(--border-default)', display:'flex', alignItems:'center', gap:6 }}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 1L3 6l5 5"/></svg>
                Retour
              </button>
              <span style={{ fontSize:14, fontWeight:510, color:'var(--text-primary)' }}>📄 {subLabel}</span>
              <span style={{ fontSize:11, color:'var(--text-muted)', background:'rgba(94,106,210,0.1)', border:'1px solid rgba(94,106,210,0.2)', borderRadius:20, padding:'2px 10px' }}>{CAT_LABEL_MAP[viewing.category] || 'Droit général'}</span>
              <div style={{ flex:1 }}/>
              <button onClick={() => downloadDossierPdf(viewing.data, subLabel)}
                title="Télécharger en PDF"
                style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:6, border:'1px solid var(--border-default)', background:'rgba(239,68,68,0.06)', color:'#ef4444', fontSize:12, fontWeight:600, cursor:'pointer', transition:'background 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.background='rgba(239,68,68,0.14)'}
                onMouseLeave={e => e.currentTarget.style.background='rgba(239,68,68,0.06)'}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                PDF
              </button>
              <button onClick={() => downloadDossierDoc(viewing.data, subLabel)}
                title="Télécharger en Word"
                style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:6, border:'1px solid var(--border-default)', background:'rgba(59,130,246,0.06)', color:'#3b82f6', fontSize:12, fontWeight:600, cursor:'pointer', transition:'background 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.background='rgba(59,130,246,0.14)'}
                onMouseLeave={e => e.currentTarget.style.background='rgba(59,130,246,0.06)'}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                DOC
              </button>
              <button onClick={onClose} style={{ background:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:13, padding:'5px 10px', borderRadius:6, border:'1px solid var(--border-default)' }}>✕ Fermer</button>
            </div>
            {/* Layout : chat IA gauche (mode édition uniquement) + document */}
            <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
              {viewMode === 'edit' && (
                <div style={{ width:340, borderRight:'1px solid var(--border-default)', background:'var(--bg-panel)', flexShrink:0, display:'flex', flexDirection:'column' }}>
                  <DossierChat
                    dossier={viewing}
                    userPlan={userPlan}
                    onUpdate={newData => setViewing(v => ({ ...v, data: newData }))}
                  />
                </div>
              )}
              {/* Document droite */}
              <div style={{ flex:1, overflowY:'auto', padding:'32px 24px' }}>
                <DossierDocument data={viewing.data} subLabel={subLabel} />
                <div style={{ maxWidth:660, margin:'16px auto 0', display:'flex', justifyContent:'flex-end', gap:10 }}>
                  {viewMode === 'view' && (userPlan === 'pro_plus' || userPlan === 'admin') && (
                    <button onClick={() => setViewMode('edit')}
                      style={{ padding:'10px 22px', borderRadius:8, border:'none', background:'#5e6ad2', color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}
                      onMouseEnter={e => e.currentTarget.style.background='#828fff'}
                      onMouseLeave={e => e.currentTarget.style.background='#5e6ad2'}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                      Modifier avec l'IA
                    </button>
                  )}
                  <button onClick={() => setViewing(null)} style={{ padding:'10px 22px', borderRadius:8, border:'1px solid var(--border-default)', background:'transparent', color:'var(--text-body)', fontSize:14, fontWeight:510, cursor:'pointer' }}>
                    Retour à la liste
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Liste ──
      return (
        <div style={{ position:'fixed', inset:0, zIndex:700, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:18, width:'100%', maxWidth:600, maxHeight:'88vh', display:'flex', flexDirection:'column', overflow:'hidden' }}>

            {/* Header */}
            <div style={{ padding:'20px 24px 16px', borderBottom:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
              <div>
                <div style={{ fontSize:18, fontWeight:600, color:'var(--text-primary)' }}>📁 Mes dossiers</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>Documents juridiques générés lors de vos démarches</div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:20, cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>

            {/* Body */}
            <div style={{ flex:1, overflowY:'auto', padding:'20px 24px' }}>
              {loadingView && (
                <div style={{ textAlign:'center', padding:'40px 0' }}>
                  <div style={{ width:36, height:36, borderRadius:'50%', border:'3px solid var(--border-default)', borderTopColor:'#5e6ad2', animation:'spin 0.9s linear infinite', margin:'0 auto 16px' }}/>
                  <p style={{ fontSize:13, color:'var(--text-muted)' }}>Chargement du dossier…</p>
                </div>
              )}
              {!loadingView && loading && (
                <div style={{ textAlign:'center', padding:'40px 0' }}>
                  <div style={{ width:36, height:36, borderRadius:'50%', border:'3px solid var(--border-default)', borderTopColor:'#5e6ad2', animation:'spin 0.9s linear infinite', margin:'0 auto 16px' }}/>
                  <p style={{ fontSize:13, color:'var(--text-muted)' }}>Chargement…</p>
                </div>
              )}
              {!loadingView && !loading && dossiers.length === 0 && (
                <div style={{ textAlign:'center', padding:'48px 0' }}>
                  <div style={{ fontSize:48, marginBottom:16 }}>📂</div>
                  <p style={{ fontSize:15, color:'var(--text-muted)', lineHeight:1.6 }}>Aucun dossier pour l'instant.<br/>Commencez une démarche pour générer votre premier document.</p>
                </div>
              )}
              {!loadingView && !loading && dossiers.length > 0 && (
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {dossiers.map(d => (
                    <div key={d.id} onClick={() => openDossier(d.id, 'edit')}
                      style={{ padding:'14px 16px', borderRadius:12, border:'1px solid var(--border-default)', background:'var(--bg-surface)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, transition:'border-color 0.15s, background 0.15s' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(94,106,210,0.5)'; e.currentTarget.style.background='rgba(94,106,210,0.04)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border-default)'; e.currentTarget.style.background='var(--bg-surface)'; }}
                    >
                      <div style={{ display:'flex', alignItems:'center', gap:12, flex:1, minWidth:0 }}>
                        <div style={{ width:38, height:38, borderRadius:8, background:'rgba(94,106,210,0.12)', border:'1px solid rgba(94,106,210,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 }}>📄</div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:14, fontWeight:600, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{d.title}</div>
                          <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2, display:'flex', gap:8 }}>
                            <span>{CAT_LABEL_MAP[d.category] || 'Droit général'}</span>
                            <span>·</span>
                            <span>{d.created_at ? new Date(d.created_at).toLocaleDateString('fr-FR') : ''}</span>
                          </div>
                        </div>
                      </div>
                      <div style={{ display:'flex', gap:6, flexShrink:0, alignItems:'center' }}>
                        <button onClick={e => { e.stopPropagation(); openDossier(d.id, 'edit'); }}
                          title="Modifier avec l'IA"
                          style={{ padding:'6px 12px', borderRadius:6, border:'1px solid rgba(94,106,210,0.3)', background:'rgba(94,106,210,0.08)', color:'#7170ff', fontSize:12, fontWeight:600, cursor:'pointer' }}
                          onMouseEnter={e => e.currentTarget.style.background='rgba(94,106,210,0.18)'}
                          onMouseLeave={e => e.currentTarget.style.background='rgba(94,106,210,0.08)'}>
                          Modifier
                        </button>
                        <button onClick={e => { e.stopPropagation(); openDossier(d.id, 'view'); }}
                          title="Voir le dossier"
                          style={{ width:30, height:30, borderRadius:6, border:'1px solid var(--border-default)', background:'transparent', color:'var(--text-muted)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}
                          onMouseEnter={e => { e.currentTarget.style.background='rgba(94,106,210,0.08)'; e.currentTarget.style.color='#7170ff'; e.currentTarget.style.borderColor='rgba(94,106,210,0.3)'; }}
                          onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--text-muted)'; e.currentTarget.style.borderColor='var(--border-default)'; }}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button onClick={e => deleteDossier(d.id, e)}
                          style={{ padding:'6px 10px', borderRadius:6, border:'1px solid rgba(239,68,68,0.2)', background:'transparent', color:'rgba(239,68,68,0.7)', fontSize:12, cursor:'pointer' }}
                          onMouseEnter={e => { e.currentTarget.style.background='rgba(239,68,68,0.08)'; e.currentTarget.style.color='#ef4444'; }}
                          onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='rgba(239,68,68,0.7)'; }}>
                          🗑
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ── DossierPickerModal ─────────────────────────────── */

    const inferCategory = title => {
      const t = (title || '').toLowerCase();
      if (/travail|emploi|licenci|salaire|contrat de travail|employeur/.test(t)) return 'travail';
      if (/loyer|locatif|bail|logement|propri|locataire|expulsion/.test(t)) return 'locatif';
      if (/routier|accident|permis|contravent|véhicule|vehicule/.test(t)) return 'routier';
      if (/famille|divorce|succession|enfant|garde|héritage|mariage|séparation/.test(t)) return 'famille';
      if (/consomm|achat|remboursement|garantie|vendeur/.test(t)) return 'consommation';
      if (/pénal|penal|plainte|infraction|fraude|vol|agress/.test(t)) return 'penal';
      if (/sant|médical|medical|hôpital|hospital/.test(t)) return 'sante';
      if (/admin|préfecture|prefecture|administration|visa|mairie/.test(t)) return 'administratif';
      if (/affaires|société|contrat|commerce|entreprise/.test(t)) return 'affaires';
      return 'contacter_avocat';
    };

    const DOMAIN_PICKER = [
      { id:'travail',         icon:'💼', label:'Droit du travail' },
      { id:'locatif',         icon:'🏠', label:'Droit immobilier / locatif' },
      { id:'consommation',    icon:'🛒', label:'Droit de la consommation' },
      { id:'routier',         icon:'🚗', label:'Droit routier' },
      { id:'famille',         icon:'👨‍👩‍👧', label:'Droit de la famille' },
      { id:'demeure',         icon:'💰', label:'Recouvrement de créances' },
      { id:'penal',           icon:'⚖️', label:'Droit pénal' },
      { id:'sante',           icon:'🏥', label:'Droit de la santé' },
      { id:'administratif',   icon:'📋', label:'Droit administratif' },
      { id:'affaires',        icon:'🏢', label:'Droit des affaires' },
      { id:'contacter_avocat',icon:'⚖️', label:'Droit général' },
    ];

    const DossierPickerModal = ({ onClose, user }) => {
      const isPlus = user?.plan === 'pro_plus' || user?.plan === 'admin';
      const [view, setView]         = useState('pick'); // 'pick' | 'match'
      const [convos, setConvos]     = useState([]);
      const [loadingC, setLoadingC] = useState(true);
      const [selected, setSelected] = useState(null);
      const [domain, setDomain]     = useState(null);
      const [city, setCity]         = useState('');
      const [cityErr, setCityErr]   = useState(false);
      const [domainErr, setDomainErr] = useState(false);

      useEffect(() => {
        if (!isPlus) { setLoadingC(false); return; } // Premium simple : pas de dossiers
        fetch('/api/dossiers', { headers: authHeaders() })
          .then(r => r.ok ? r.json() : { dossiers: [] })
          .then(d => {
            const list = d.dossiers || [];
            setConvos(list);
            if (list.length > 0) setSelected(list[0]); // Pré-sélection du dossier le plus récent
            setLoadingC(false);
          })
          .catch(() => setLoadingC(false));
      }, [isPlus]);

      if (view === 'match') {
        const cat = selected?.category || domain || 'contacter_avocat';
        return (
          <LawyerMatchModal
            formData={{ category: cat, lawyerCity: city, email: user?.email || '' }}
            onClose={onClose}
          />
        );
      }

      const needsDomain = !selected; // si aucun dossier sélectionné → domaine requis
      const handleSearch = () => {
        const cityOk = !!city.trim();
        const domainOk = !!selected || !!domain;
        if (!cityOk) setCityErr(true);
        if (!domainOk) setDomainErr(true);
        if (cityOk && domainOk) setView('match');
      };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:900, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:18, width:'100%', maxWidth:560, maxHeight:'88vh', display:'flex', flexDirection:'column', overflow:'hidden' }}>

            {/* Header */}
            <div style={{ padding:'20px 24px 16px', borderBottom:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
              <div>
                <div style={{ fontSize:18, fontWeight:600, color:'var(--text-primary)' }}>👨‍⚖️ Contacter un avocat</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>{isPlus ? 'Choisissez un dossier ou un domaine de droit' : 'Choisissez le domaine pour trouver un avocat spécialisé'}</div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:20, cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>

            {/* Body */}
            <div style={{ flex:1, overflowY:'auto', padding:'20px 24px', display:'flex', flexDirection:'column', gap:20 }}>

              {/* Commune autocomplete */}
              <div>
                <label style={{ fontSize:12, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.03em', display:'block', marginBottom:6 }}>
                  📍 Votre commune <span style={{ color:'#7170ff' }}>*</span>
                </label>
                <CommuneAutocomplete value={city} onChange={v => { setCity(v); setCityErr(false); }} placeholder="Ex : Lyon, Bordeaux, Marseille…" />
                {cityErr && <div style={{ fontSize:11, color:'#ef4444', marginTop:4 }}>Veuillez entrer votre commune.</div>}
              </div>

              {/* Dossier list (Premium+ uniquement) */}
              {isPlus && (loadingC || convos.length > 0) && (
                <div>
                  <div style={{ fontSize:10, fontWeight:700, color:'var(--text-subtle)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Optionnel</div>
                  <label style={{ fontSize:12, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.03em', display:'block', marginBottom:10 }}>
                    📂 Choisir un dossier <span style={{ fontSize:11, fontWeight:400, color:'var(--text-subtle)' }}>(pré-sélectionné — cliquez pour désélectionner)</span>
                  </label>
                  {loadingC ? (
                    <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 0', color:'var(--text-muted)', fontSize:13 }}>
                      <div style={{ width:18, height:18, borderRadius:'50%', border:'2px solid var(--border-default)', borderTopColor:'#5e6ad2', animation:'spin 0.9s linear infinite', flexShrink:0 }}/>
                      Chargement des dossiers…
                    </div>
                  ) : (
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                      {convos.map(c => {
                        const isSel = selected?.id === c.id;
                        return (
                          <div key={c.id}
                            onClick={() => { setSelected(isSel ? null : c); if (!isSel) { setDomain(null); setDomainErr(false); } }}
                            style={{ padding:'12px 14px', borderRadius:10, border:`1.5px solid ${isSel?'#5e6ad2':'var(--border-default)'}`, background: isSel?'rgba(94,106,210,0.08)':'transparent', cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}
                            onMouseEnter={e => { if (!isSel) e.currentTarget.style.borderColor='rgba(94,106,210,0.4)'; }}
                            onMouseLeave={e => { if (!isSel) e.currentTarget.style.borderColor='var(--border-default)'; }}
                          >
                            <div>
                              <div style={{ fontSize:13, fontWeight:600, color:'var(--text-primary)', marginBottom:2 }}>{c.title || 'Dossier sans titre'}</div>
                              <div style={{ fontSize:11, color:'var(--text-muted)' }}>{CAT_LABEL_MAP[c.category] || ''} {c.created_at ? '· ' + new Date(c.created_at).toLocaleDateString('fr-FR') : ''}</div>
                            </div>
                            {isSel && <div style={{ width:18, height:18, borderRadius:'50%', background:'#5e6ad2', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg></div>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              {/* Domain picker (toujours pour Premium simple, sinon en fallback si pas de dossier sélectionné) */}
              {!selected && (
                <div>
                  <label style={{ fontSize:12, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.03em', display:'block', marginBottom:10 }}>
                    🎯 Domaine de droit <span style={{ color:'#7170ff' }}>*</span>
                  </label>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                    {DOMAIN_PICKER.map(dom => {
                      const isSel = domain === dom.id;
                      return (
                        <div key={dom.id} onClick={() => { setDomain(dom.id); setDomainErr(false); }}
                          style={{ padding:'10px 12px', borderRadius:10, border:`1.5px solid ${isSel?'#5e6ad2':'var(--border-default)'}`, background: isSel?'rgba(94,106,210,0.08)':'transparent', cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:9 }}
                          onMouseEnter={e => { if (!isSel) e.currentTarget.style.borderColor='rgba(94,106,210,0.4)'; }}
                          onMouseLeave={e => { if (!isSel) e.currentTarget.style.borderColor='var(--border-default)'; }}>
                          <span style={{ fontSize:16 }}>{dom.icon}</span>
                          <span style={{ fontSize:12, fontWeight:510, color:'var(--text-primary)', lineHeight:1.3 }}>{dom.label}</span>
                        </div>
                      );
                    })}
                  </div>
                  {domainErr && <div style={{ fontSize:11, color:'#ef4444', marginTop:6 }}>Sélectionnez un domaine de droit.</div>}
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{ padding:'14px 24px', borderTop:'1px solid var(--border-subtle)', flexShrink:0 }}>
              <button onClick={handleSearch}
                style={{ width:'100%', padding:'12px', borderRadius:8, border:'none', background:'#5e6ad2', color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer', transition:'all 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.background='#828fff'}
                onMouseLeave={e => e.currentTarget.style.background='#5e6ad2'}>
                {selected
                  ? `🔍 Avocats pour "${(selected.title||'').slice(0,32)+'…'}"`
                  : domain
                    ? `🔍 Avocats — ${DOMAIN_PICKER.find(d=>d.id===domain)?.label || ''}`
                    : '🔍 Trouver un avocat spécialisé'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ── AlertsModal (Premium+ : alertes délais légaux par téléphone) ─ */

    const ALERTS_KEY = 'avocai_phone_alerts';

    const AlertsModal = ({ onClose, userPlan }) => {
      const isPlus = userPlan === 'pro_plus' || userPlan === 'admin';
      const saved  = (() => { try { return JSON.parse(localStorage.getItem(ALERTS_KEY) || 'null'); } catch { return null; } })();
      const [phone, setPhone]     = useState(saved?.phone || '');
      const [enabled, setEnabled] = useState(saved?.enabled || false);
      const [done, setDone]       = useState(false);

      const fmt = v => v.replace(/[^\d +]/g, '').slice(0, 17);
      const valid = /^(\+?\d[\d\s]{8,16})$/.test(phone.trim());

      const save = () => {
        if (!valid) return;
        localStorage.setItem(ALERTS_KEY, JSON.stringify({ phone: phone.trim(), enabled: true, ts: Date.now() }));
        setEnabled(true); setDone(true);
        setTimeout(() => onClose(), 1400);
      };
      const disable = () => {
        localStorage.removeItem(ALERTS_KEY);
        setEnabled(false); setPhone('');
      };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:950, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:18, width:'100%', maxWidth:460, padding:'24px 26px', boxShadow:'0 20px 60px rgba(0,0,0,0.4)' }}>
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', color: isPlus ? '#a78bfa' : '#7170ff', textTransform:'uppercase', marginBottom:4 }}>
                  {isPlus ? 'Premium+ · Alertes' : 'Aperçu'}
                </div>
                <div style={{ fontSize:18, fontWeight:600, color:'var(--text-primary)' }}>🔔 Alertes délais légaux</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4, lineHeight:1.55 }}>
                  Recevez un appel automatique avant l'expiration de vos délais (mise en demeure, recours, prescription…).
                </div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:20, cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>

            {!isPlus ? (
              <div style={{ marginTop:12, padding:'14px 16px', background:'rgba(167,139,250,0.08)', border:'1px solid rgba(167,139,250,0.25)', borderRadius:10 }}>
                <div style={{ fontSize:13, color:'var(--text-body)', lineHeight:1.6, marginBottom:12 }}>Cette fonctionnalité est réservée aux abonnés <strong style={{ color:'#a78bfa' }}>Premium+</strong>.</div>
                <a href="/#tarifs" onClick={onClose} style={{ display:'inline-block', padding:'9px 16px', borderRadius:8, background:'linear-gradient(135deg,#7c3aed,#a78bfa)', color:'#fff', fontSize:13, fontWeight:600, textDecoration:'none' }}>Découvrir Premium+ →</a>
              </div>
            ) : done ? (
              <div style={{ padding:'18px 14px', textAlign:'center' }}>
                <div style={{ fontSize:32, marginBottom:10 }}>✅</div>
                <div style={{ fontSize:14, fontWeight:600, color:'#22c55e', marginBottom:4 }}>Alertes activées !</div>
                <div style={{ fontSize:12, color:'var(--text-muted)' }}>Nous vous appellerons sur le {phone}.</div>
              </div>
            ) : (
              <>
                <label style={{ fontSize:11, fontWeight:600, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.04em', display:'block', marginBottom:6, marginTop:10 }}>
                  📞 Numéro de téléphone
                </label>
                <input value={phone} onChange={e => setPhone(fmt(e.target.value))}
                  placeholder="+33 6 12 34 56 78"
                  style={{ width:'100%', padding:'10px 14px', borderRadius:8, border:'1px solid var(--border-default)', background:'var(--bg-surface)', color:'var(--text-primary)', fontSize:14, outline:'none', boxSizing:'border-box' }}
                  onFocus={e => e.target.style.borderColor='#5e6ad2'} onBlur={e => e.target.style.borderColor='var(--border-default)'}/>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:6, lineHeight:1.5 }}>Appel automatique 7 jours et 48 h avant chaque échéance détectée dans vos dossiers.</div>

                <div style={{ display:'flex', gap:8, marginTop:18 }}>
                  {enabled && <button onClick={disable} style={{ flex:1, padding:'10px 14px', borderRadius:8, border:'1px solid rgba(239,68,68,0.3)', background:'transparent', color:'#ef4444', fontSize:13, fontWeight:600, cursor:'pointer' }}>Désactiver</button>}
                  <button onClick={save} disabled={!valid}
                    style={{ flex:2, padding:'10px 14px', borderRadius:8, border:'none', background: valid?'#5e6ad2':'var(--border-default)', color: valid?'#fff':'var(--text-subtle)', fontSize:13, fontWeight:600, cursor: valid?'pointer':'not-allowed' }}
                    onMouseEnter={e => { if(valid) e.currentTarget.style.background='#828fff'; }}
                    onMouseLeave={e => { if(valid) e.currentTarget.style.background='#5e6ad2'; }}>
                    {enabled ? 'Mettre à jour' : '🔔 Activer les alertes'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    /* ── SupportModal (contact équipe) ──────────────────── */

    const SupportModal = ({ onClose, user }) => {
      const isPlus = user?.plan === 'pro_plus' || user?.plan === 'admin';
      const [subject, setSubject] = useState('');
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [sent, setSent] = useState(false);

      const send = async () => {
        if (!message.trim() || sending) return;
        setSending(true);
        // À configurer : endpoint backend ou mailto
        try {
          await fetch('/api/support', {
            method:'POST', headers:{ ...authHeaders(), 'Content-Type':'application/json' },
            body: JSON.stringify({ subject, message, plan: user?.plan })
          });
        } catch {}
        setSending(false); setSent(true);
        setTimeout(() => onClose(), 1500);
      };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:950, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:18, width:'100%', maxWidth:480, padding:'24px 26px', boxShadow:'0 20px 60px rgba(0,0,0,0.4)' }}>
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', color: isPlus ? '#a78bfa' : '#7170ff', textTransform:'uppercase', marginBottom:4 }}>
                  {isPlus ? 'Support prioritaire 24h' : 'Support 24h'}
                </div>
                <div style={{ fontSize:18, fontWeight:600, color:'var(--text-primary)' }}>💬 Contacter le support</div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>Notre équipe vous répondra à <strong style={{ color:'#7170ff' }}>{user?.email || 'votre email'}</strong>.</div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:20, cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>

            {sent ? (
              <div style={{ padding:'24px 14px', textAlign:'center' }}>
                <div style={{ fontSize:32, marginBottom:10 }}>📨</div>
                <div style={{ fontSize:14, fontWeight:600, color:'#22c55e', marginBottom:4 }}>Message envoyé !</div>
                <div style={{ fontSize:12, color:'var(--text-muted)' }}>Réponse sous {isPlus ? '6h max' : '24h'}.</div>
              </div>
            ) : (
              <>
                <input value={subject} onChange={e => setSubject(e.target.value)}
                  placeholder="Sujet (optionnel)"
                  style={{ width:'100%', padding:'10px 14px', borderRadius:8, border:'1px solid var(--border-default)', background:'var(--bg-surface)', color:'var(--text-primary)', fontSize:14, outline:'none', marginTop:8, boxSizing:'border-box' }}
                  onFocus={e => e.target.style.borderColor='#5e6ad2'} onBlur={e => e.target.style.borderColor='var(--border-default)'}/>
                <textarea value={message} onChange={e => setMessage(e.target.value)}
                  placeholder="Décrivez votre problème ou votre question…" rows={5}
                  style={{ width:'100%', padding:'10px 14px', borderRadius:8, border:'1px solid var(--border-default)', background:'var(--bg-surface)', color:'var(--text-primary)', fontSize:13, outline:'none', marginTop:10, resize:'vertical', minHeight:100, fontFamily:'inherit', boxSizing:'border-box', lineHeight:1.5 }}
                  onFocus={e => e.target.style.borderColor='#5e6ad2'} onBlur={e => e.target.style.borderColor='var(--border-default)'}/>
                <button onClick={send} disabled={!message.trim() || sending}
                  style={{ width:'100%', padding:'11px 14px', borderRadius:8, border:'none', background: message.trim()&&!sending?'#5e6ad2':'var(--border-default)', color: message.trim()&&!sending?'#fff':'var(--text-subtle)', fontSize:14, fontWeight:600, cursor: message.trim()&&!sending?'pointer':'not-allowed', marginTop:14 }}
                  onMouseEnter={e => { if(message.trim()&&!sending) e.currentTarget.style.background='#828fff'; }}
                  onMouseLeave={e => { if(message.trim()&&!sending) e.currentTarget.style.background='#5e6ad2'; }}>
                  {sending ? 'Envoi…' : 'Envoyer le message'}
                </button>
              </>
            )}
          </div>
        </div>
      );
    };

    /* ── App root ────────────────────────────────────────── */

    const App = () => {
      const [page, setPage] = useState(() =>
        getToken() && (sessionStorage.getItem('avocai_pending_message') || sessionStorage.getItem('avocai_guest_session')) ? 'chat' : 'landing'
      );
      const [theme, setTheme] = useState(() => localStorage.getItem('avocai_theme') || 'dark');
      const [heroMessage, setHeroMessage] = useState(null);
      const [scrollTarget, setScrollTarget] = useState(null);
      const [appUser, setAppUser] = useState(getStoredUser);
      const [showLawyerModal, setShowLawyerModal] = useState(false);
      const [showDossierModal, setShowDossierModal] = useState(false);
      const [showAlertsModal, setShowAlertsModal] = useState(false);
      const [showSupportModal, setShowSupportModal] = useState(false);

      useEffect(() => {
        const onLawyer  = () => setShowLawyerModal(true);
        const onDossier = () => setShowDossierModal(true);
        const onAlerts  = () => setShowAlertsModal(true);
        const onSupport = () => setShowSupportModal(true);
        window.addEventListener('avocai:open-lawyer-search', onLawyer);
        window.addEventListener('avocai:open-dossiers', onDossier);
        window.addEventListener('avocai:open-alerts', onAlerts);
        window.addEventListener('avocai:open-support', onSupport);
        return () => {
          window.removeEventListener('avocai:open-lawyer-search', onLawyer);
          window.removeEventListener('avocai:open-dossiers', onDossier);
          window.removeEventListener('avocai:open-alerts', onAlerts);
          window.removeEventListener('avocai:open-support', onSupport);
        };
      }, []);

      // Rafraîchit le plan depuis /api/me à chaque chargement (ex: retour après paiement Stripe)
      useEffect(() => {
        if (!getToken()) return;
        fetch('/api/auth/me', { headers: authHeaders() })
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data?.user) {
              setAppUser(data.user);
              localStorage.setItem('avocai_user', JSON.stringify(data.user));
            }
          })
          .catch(() => {});
      }, []);

      useEffect(() => {
        if (page === 'landing' && scrollTarget) {
          const id = scrollTarget;
          setScrollTarget(null);
          setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }), 80);
        }
      }, [page, scrollTarget]);

      const toggleTheme = () => {
        const next = theme === 'light' ? 'dark' : 'light';
        setTheme(next);
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('avocai_theme', next);
      };

      const handleHeroSend = (text) => {
        setHeroMessage(text);
      };

      return (
        <div>
          <Navbar page={page} setPage={setPage} theme={theme} toggleTheme={toggleTheme} onNavSection={id => { setScrollTarget(id); setPage('landing'); }} user={appUser} />
          {page === 'landing'
            ? <LandingPage setPage={setPage} onHeroSend={handleHeroSend} />
            : <ChatInterface setPage={setPage} heroMessage={heroMessage} onHeroMessageConsumed={() => setHeroMessage(null)} onUserUpdate={setAppUser} />}
          {showLawyerModal && <DossierPickerModal onClose={() => setShowLawyerModal(false)} user={appUser} />}
          {showDossierModal && <DossierListModal onClose={() => setShowDossierModal(false)} userPlan={appUser?.plan} />}
          {showAlertsModal && <AlertsModal onClose={() => setShowAlertsModal(false)} userPlan={appUser?.plan} />}
          {showSupportModal && <SupportModal onClose={() => setShowSupportModal(false)} user={appUser} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
