<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvocAI — Comprenez vos droits. Défendez-vous.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <style>
    /* ── Theme tokens ──────────────────────────────────── */
    :root {
      --bg-page:             #e8e9eb;
      --bg-panel:            #dedfe2;
      --bg-surface:          #ffffff;
      --bg-surface-elevated: #ffffff;
      --text-primary:        #111827;
      --text-body:           #1f2937;
      --text-muted:          #4b5563;
      --text-subtle:         #6b7280;
      --border-default:      rgba(0,0,0,0.18);
      --border-subtle:       rgba(0,0,0,0.12);
      --btn-bg:              #e4e5e7;
      --btn-border:          rgba(0,0,0,0.16);
      --brand:               #5e6ad2;
      --accent:              #7170ff;
      --accent-hover:        #828fff;
      --success:             #27a644;
      --warning:             #f59e0b;
      --danger:              #ef4444;
    }
    [data-theme="light"] {
      --bg-page:             #e8e9eb;
      --bg-panel:            #dedfe2;
      --bg-surface:          #ffffff;
      --bg-surface-elevated: #ffffff;
      --bg-elevated:         #e4e5e7;
      --btn-bg:              #e4e5e7;
      --btn-border:          rgba(0,0,0,0.16);
      --border-default:      rgba(0,0,0,0.18);
      --border-subtle:       rgba(0,0,0,0.12);
      --text-primary:        #111827;
      --text-body:           #1f2937;
      --text-muted:          #4b5563;
      --text-subtle:         #6b7280;
    }
    [data-theme="dark"] {
      --bg-page:             #08090a;
      --bg-panel:            #0f1011;
      --bg-surface:          #191a1b;
      --bg-surface-elevated: #28282c;
      --text-primary:        #f7f8f8;
      --text-body:           #d0d6e0;
      --text-muted:          #8a8f98;
      --text-subtle:         #62666d;
      --border-default:      rgba(255,255,255,0.08);
      --border-subtle:       rgba(255,255,255,0.05);
      --btn-bg:              rgba(255,255,255,0.02);
      --btn-border:          rgba(255,255,255,0.08);
    }

    /* ── Reset & base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { transition: background-color 200ms ease, color 200ms ease; }
    body {
      font-family: "Inter", "Inter Variable", sans-serif;
      font-feature-settings: "cv01", "ss03";
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 9999px; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    textarea::placeholder { color: var(--text-subtle); }
    input::placeholder { color: var(--text-subtle); }
    textarea { color-scheme: light dark; }

    /* ── Responsive navbar ──────────────────────────────── */
    @media (max-width: 767px) {
      .nav-center  { display: none !important; }
      .nav-login   { display: none !important; }
      .nav-try-btn { padding: 5px 10px !important; font-size: 13px !important; width: auto !important; height: 30px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Applique le thème sauvegardé immédiatement ────── */
    (() => {
      const t = localStorage.getItem('avocai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();

    /* ── Récupère le token Google après le redirect OAuth ── */
    (() => {
      const p = new URLSearchParams(window.location.search);
      const t = p.get('auth_token');
      const u = p.get('auth_user');
      if (t) {
        localStorage.setItem('avocai_token', t);
        if (u) { try { localStorage.setItem('avocai_user', decodeURIComponent(u)); } catch {} }
        // Nettoie l'URL sans recharger
        window.history.replaceState({}, '', '/');
      }
    })();

    /* ── Auth helpers ───────────────────────────────────── */
    const getToken = () => localStorage.getItem('avocai_token');
    const getStoredUser = () => {
      try { return JSON.parse(localStorage.getItem('avocai_user') || 'null'); }
      catch { return null; }
    };
    const authHeaders = () => {
      const t = getToken();
      return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' }
               : { 'Content-Type': 'application/json' };
    };
    const logout = () => {
      localStorage.removeItem('avocai_token');
      localStorage.removeItem('avocai_user');
      window.location.href = '/login';
    };

    /* ── Stripe / Pro upgrade ───────────────────────────── */
    const handleProUpgrade = (plan = 'pro', isMonthly = false) => {
      window.location.href = '/checkout?plan=' + plan + '&billing=' + (isMonthly ? 'monthly' : 'weekly');
    };

    // Scroll vers la section Tarifs (depuis n'importe où)
    const scrollToPricing = () => {
      const el = document.getElementById('tarifs');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth' });
      } else {
        // Si on est dans le chat, retour landing + scroll
        window.location.href = '/#tarifs';
      }
    };

    /* ── Shared Components ──────────────────────────────── */

    const RiskMeter = ({ level }) => {
      const getColor = (l) => l <= 2 ? '#27a644' : l === 3 ? '#f59e0b' : '#ef4444';
      const getLabel = (l) => l <= 2 ? 'Faible' : l === 3 ? 'Modéré' : l === 4 ? 'Élevé' : 'Critique';
      const color = getColor(level);
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {[1,2,3,4,5].map(i => (
            <div key={i} style={{
              width: 10, height: 10, borderRadius: '50%',
              background: i <= level ? color : 'var(--border-default)',
              border: i <= level ? 'none' : '1px solid var(--border-default)',
              flexShrink: 0,
            }} />
          ))}
          <span style={{ fontSize: 13, fontWeight: 510, color, fontFeatureSettings: '"cv01","ss03"' }}>
            {getLabel(level)}
          </span>
        </div>
      );
    };

    const SanctionsBlock = ({ amende, prison, estVictime }) => (
      <div style={{
        background: estVictime ? 'rgba(94,106,210,0.05)' : 'rgba(239,68,68,0.05)',
        border: estVictime ? '1px solid rgba(94,106,210,0.22)' : '1px solid rgba(239,68,68,0.22)',
        borderLeft: estVictime ? '3px solid #5e6ad2' : '3px solid #ef4444',
        borderRadius: 8,
        padding: '18px 22px',
      }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: estVictime ? '#7170ff' : '#ef4444', textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 14, fontFeatureSettings: '"cv01","ss03"' }}>
          {estVictime ? '⚖ Sanctions risquées par le coupable' : '⚠ Sanctions encourues'}
        </div>
        <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
          {amende && (
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: 'rgba(239,68,68,0.65)', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>Amende maximale</div>
              <div style={{ fontSize: 30, fontWeight: 700, color: '#ef4444', letterSpacing: '-0.8px', lineHeight: 1, fontFeatureSettings: '"cv01","ss03"' }}>−{amende}</div>
            </div>
          )}
          {prison && (
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: 'rgba(239,68,68,0.65)', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>Emprisonnement</div>
              <div style={{ fontSize: 30, fontWeight: 700, color: '#ef4444', letterSpacing: '-0.8px', lineHeight: 1, fontFeatureSettings: '"cv01","ss03"' }}>{prison}</div>
            </div>
          )}
        </div>
      </div>
    );

    const LawBlock = ({ code, title, excerpt, link }) => {
      const [open, setOpen] = React.useState(false);
      return (
        <div style={{
          background: 'var(--bg-panel)',
          border: '1px solid var(--border-default)',
          borderLeft: '2px solid #5e6ad2',
          borderRadius: 6,
          padding: '12px 16px',
          fontFamily: '"Berkeley Mono", ui-monospace, "SF Mono", Menlo, monospace',
        }}>
          <div style={{ fontSize: 13, fontWeight: 590, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"', marginBottom: 8 }}>
            {title ? `${code} — ${title}` : code}
          </div>
          {open && (
            <div style={{ fontSize: 13, color: 'var(--text-body)', lineHeight: 1.6, marginBottom: 8 }}>
              {excerpt}
            </div>
          )}
          <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
            <button onClick={() => setOpen(o => !o)}
              style={{ fontSize: 13, fontWeight: 510, color: '#7170ff', textDecoration: 'none', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
              {open ? 'Masquer ↑' : 'En savoir plus'}
            </button>
            {link && open && (
              <a href={link} target="_blank" rel="noopener noreferrer"
                style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-muted)', textDecoration: 'none' }}>
                Lire l'article complet →
              </a>
            )}
          </div>
        </div>
      );
    };

    const PremiumBlock = ({ title, body, cta, onCta }) => (
      <div style={{
        background: 'var(--bg-surface-elevated)',
        borderLeft: '3px solid #5e6ad2',
        borderRadius: '0 6px 6px 0',
        padding: 16,
      }}>
        <div style={{ fontSize: 11, fontWeight: 510, color: '#7170ff', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6, fontFeatureSettings: '"cv01","ss03"' }}>
          ✦ Démarche disponible
        </div>
        <div style={{ fontSize: 15, fontWeight: 590, color: 'var(--text-primary)', marginBottom: 4, fontFeatureSettings: '"cv01","ss03"' }}>
          {title}
        </div>
        <div style={{ fontSize: 14, color: 'var(--text-muted)', marginBottom: 12, fontFeatureSettings: '"cv01","ss03"' }}>
          {body}
        </div>
        <button
          onClick={onCta || scrollToPricing}
          style={{ width: '100%', padding: '8px 16px', background: '#5e6ad2', color: '#fff', border: 'none', borderRadius: 6, fontSize: 14, fontWeight: 510, cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"' }}
          onMouseEnter={e => e.target.style.background = '#828fff'}
          onMouseLeave={e => e.target.style.background = '#5e6ad2'}
        >
          {cta}
        </button>
      </div>
    );

    /* ── BurgerIcon (animé) ─────────────────────────────── */

    const BurgerIcon = ({ open }) => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ pointerEvents: 'none' }}>
        {/* Hamburger (3 traits) — visibles fermé */}
        <g style={{ opacity: open ? 0 : 1, transition: 'opacity 0.18s ease' }}>
          <line x1="4" y1="7"  x2="20" y2="7"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="17" x2="20" y2="17"/>
        </g>
        {/* X (croix coin-à-coin) — visible ouvert */}
        <g style={{ opacity: open ? 1 : 0, transition: 'opacity 0.18s ease' }}>
          <line x1="6" y1="6"  x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6"  y2="18"/>
        </g>
      </svg>
    );

    /* ── PremiumBurgerMenu ──────────────────────────────── */

    const PremiumBurgerMenu = ({ user, setPage }) => {
      const [open, setOpen] = useState(false);
      const wrapRef = useRef(null);
      const isPlus = user?.plan === 'pro_plus';

      useEffect(() => {
        const handler = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      // Premium simple → contact avocat + support uniquement
      // Premium+        → tout (dossiers, contact avocat, alertes, support)
      const items = isPlus ? [
        { icon: '📁', label: 'Mes dossiers', sub: 'Consulter et modifier', action: () => window.dispatchEvent(new CustomEvent('avocai:open-dossiers')) },
        { icon: '👨‍⚖️', label: 'Contacter un avocat', sub: 'Avocats près de chez vous', action: () => window.dispatchEvent(new CustomEvent('avocai:open-lawyer-search')) },
        { icon: '🔔', label: 'Alertes délais légaux', sub: 'Par téléphone', action: () => window.dispatchEvent(new CustomEvent('avocai:open-alerts')) },
        { icon: '💬', label: 'Support', sub: '24h prioritaire', action: () => window.dispatchEvent(new CustomEvent('avocai:open-support')) },
      ] : [
        { icon: '👨‍⚖️', label: 'Contacter un avocat', sub: 'Avocats par domaine, près de chez vous', action: () => window.dispatchEvent(new CustomEvent('avocai:open-lawyer-search')) },
        { icon: '💬', label: 'Support', sub: '24h', action: () => window.dispatchEvent(new CustomEvent('avocai:open-support')) },
      ];

      return (
        <div ref={wrapRef} style={{ position: 'relative' }}>
          <button onClick={() => setOpen(o => !o)} aria-expanded={open} aria-label={open ? 'Fermer le menu' : 'Ouvrir le menu'}
            style={{
              width: 36, height: 36, borderRadius: 8,
              border: '1px solid var(--btn-border)',
              background: open ? 'var(--bg-surface-elevated)' : 'var(--btn-bg)',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'var(--text-body)', transition: 'background 0.15s, border-color 0.15s',
            }}
            onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-surface-elevated)'; e.currentTarget.style.borderColor = 'rgba(113,112,255,0.5)'; }}
            onMouseLeave={e => { if (!open) e.currentTarget.style.background = 'var(--btn-bg)'; e.currentTarget.style.borderColor = 'var(--btn-border)'; }}
          >
            <BurgerIcon open={open}/>
          </button>

          {open && (
            <div style={{
              position: 'absolute', top: 'calc(100% + 10px)', right: 0,
              width: 290, background: 'var(--bg-panel)',
              border: '1px solid var(--border-default)', borderRadius: 12,
              boxShadow: '0 12px 36px rgba(0,0,0,0.35)',
              padding: 6, zIndex: 200,
              animation: 'fadeInMenu 0.18s ease-out',
            }}>
              <style>{`@keyframes fadeInMenu { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }`}</style>
              <div style={{ padding: '8px 10px 6px', fontSize: 10, fontWeight: 700, color: 'var(--text-subtle)', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span>Mes outils</span>
                <span style={{ fontSize: 9, padding: '2px 6px', borderRadius: 4, background: isPlus ? 'rgba(167,139,250,0.15)' : 'rgba(94,106,210,0.15)', color: isPlus ? '#a78bfa' : '#7170ff', border: `1px solid ${isPlus ? 'rgba(167,139,250,0.3)' : 'rgba(113,112,255,0.3)'}` }}>{isPlus ? 'Premium+' : 'Premium'}</span>
              </div>
              {items.map((it, i) => (
                <div key={i} onClick={() => { it.action(); setOpen(false); }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 11,
                    padding: '9px 10px', borderRadius: 8, cursor: 'pointer',
                    transition: 'background 0.12s',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(94,106,210,0.1)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <div style={{
                    width: 34, height: 34, borderRadius: 8,
                    background: 'var(--bg-surface)', border: '1px solid var(--border-default)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 16, flexShrink: 0,
                  }}>{it.icon}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 590, color: 'var(--text-primary)', display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span>{it.label}</span>
                      {it.plus && <span style={{ fontSize: 9, fontWeight: 700, padding: '1px 5px', borderRadius: 3, background: 'rgba(167,139,250,0.18)', color: '#a78bfa', letterSpacing: '0.04em' }}>+</span>}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{it.sub}</div>
                  </div>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.8" style={{ color: 'var(--text-subtle)', flexShrink: 0 }}>
                    <path d="M4 2l4 4-4 4" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ── Navbar ─────────────────────────────────────────── */

    const PLAN_LABEL = { pro: 'Premium', pro_plus: 'Premium +' };

    const Navbar = ({ page, setPage, theme, toggleTheme, onNavSection, user }) => (
      <nav style={{
        position: 'sticky', top: 0, zIndex: 100,
        height: 56, background: 'var(--bg-panel)',
        borderBottom: '1px solid var(--border-subtle)',
        display: 'flex', alignItems: 'center',
        padding: '0 24px', gap: 0,
      }}>
        {/* Logo */}
        <div onClick={() => setPage('landing')} style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="6" fill="#5e6ad2" />
            <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fillOpacity="0.95" />
            <circle cx="14" cy="20" r="1.5" fill="#7170ff" />
          </svg>
          <span style={{ fontSize: 16, fontWeight: 590, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"', letterSpacing: '-0.2px' }}>AvocAI</span>
        </div>

        {/* Center nav */}
        <div className="nav-center" style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 32, alignItems: 'center' }}>
          <a onClick={e => { e.preventDefault(); setPage('chat'); }} href="#"
            style={{ fontSize: 13, fontWeight: 590, textDecoration: 'none', fontFeatureSettings: '"cv01","ss03"', cursor: 'pointer', color: page === 'chat' ? '#7170ff' : 'var(--text-primary)', borderBottom: page === 'chat' ? '1px solid #7170ff' : 'none', paddingBottom: page === 'chat' ? 2 : 0 }}
            onMouseEnter={e => e.currentTarget.style.color = '#7170ff'}
            onMouseLeave={e => e.currentTarget.style.color = page === 'chat' ? '#7170ff' : 'var(--text-primary)'}
          >Chat</a>
          {[['Fonctionnalités', 'fonctionnalites'], ['Tarifs', 'tarifs'], ['FAQ', 'faq']].map(([label, id]) => (
            <a key={id} href={`#${id}`} onClick={e => {
              e.preventDefault();
              if (page === 'landing') {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
              } else {
                onNavSection(id);
              }
            }}
              style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-body)', textDecoration: 'none', fontFeatureSettings: '"cv01","ss03"' }}
              onMouseEnter={e => e.target.style.color = 'var(--text-primary)'}
              onMouseLeave={e => e.target.style.color = 'var(--text-body)'}
            >{label}</a>
          ))}
        </div>

        {/* Right buttons */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0, marginLeft: 'auto' }}>
          {getToken() ? (
            <>
              {/* Badge plan si premium */}
              {(user?.plan === 'pro' || user?.plan === 'pro_plus') && (
                <span style={{
                  fontSize: 11, fontWeight: 600, letterSpacing: 0.3,
                  padding: '3px 9px', borderRadius: 9999,
                  background: 'rgba(94,106,210,0.15)', color: '#7170ff',
                  border: '1px solid rgba(113,112,255,0.3)',
                  fontFeatureSettings: '"cv01","ss03"',
                }}>
                  {PLAN_LABEL[user.plan]}
                </span>
              )}
              <button className="nav-login" onClick={logout} style={{
                padding: '6px 14px', borderRadius: 6, border: '1px solid var(--btn-border)',
                background: 'var(--btn-bg)', cursor: 'pointer',
                fontSize: 14, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', color: 'var(--text-body)',
              }}>Se déconnecter</button>
              {(user?.plan === 'pro' || user?.plan === 'pro_plus') ? (
                <PremiumBurgerMenu user={user} setPage={setPage} />
              ) : (
                <button className="nav-try-btn" onClick={scrollToPricing}
                  style={{ padding: '6px 14px', borderRadius: 6, border: 'none', background: '#5e6ad2', color: '#fff', cursor: 'pointer', fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', fontSize: 14, height: 32 }}
                  onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                  onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
                >Passer à Premium</button>
              )}
            </>
          ) : (
            <>
              <button className="nav-login" onClick={() => window.location.href = '/login'} style={{
                padding: '6px 14px', borderRadius: 6, border: '1px solid var(--btn-border)',
                background: 'var(--btn-bg)', cursor: 'pointer',
                fontSize: 14, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', color: 'var(--text-body)',
              }}>Se connecter</button>
              <button className="nav-try-btn" onClick={() => window.location.href = '/register'}
                style={{ padding: '6px 14px', borderRadius: 6, border: 'none', background: '#5e6ad2', color: '#fff', cursor: 'pointer', fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', fontSize: 14, height: 32 }}
                onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
              >Essayer gratuitement</button>
            </>
          )}
        </div>

        {/* Theme toggle — fixed bottom right */}
        <button onClick={toggleTheme} style={{

        when:    { label:'Depuis quand et fréquence *', placeholder:'Ex : Depuis septembre 2023, mon responsable me fait des remarques humiliantes lors des réunions, environ 2 à 3 fois par semaine.' },
        party:   { label:'Auteur du harcèlement *', placeholder:'Prénom, nom et poste de la personne', tip:'Si plusieurs personnes sont impliquées, citez la principale.' },
      },
      'routier-amende': {
        problem: { label:'Décrivez l\'infraction contestée *', placeholder:'Quelle infraction vous est reprochée ? Pour quelle raison la contestez-vous (erreur, véhicule vendu, pas à bord, etc.) ?' },
        when:    { label:'Date de l\'infraction et réception de l\'avis *', placeholder:'Ex : Infraction le 10 mars 2024. Avis de contravention reçu le 20 mars. Délai de contestation : 45 jours.' },
        party:   { label:'Autorité verbalisatrice *', placeholder:'Ex : Police nationale, Gendarmerie, Préfecture…', tip:'Indiquez l\'autorité mentionnée sur l\'avis de contravention.' },
      },
      'routier-points': {
        problem: { label:'Décrivez la situation *', placeholder:'Retrait de points contesté, permis invalidé, points non restitués ? Expliquez.' },
        when:    { label:'Date de notification *', placeholder:'Ex : J\'ai reçu l\'avis de retrait de points le 15 mars 2024 suite à une infraction du… Je n\'ai jamais reçu l\'avis préalable.' },
        party:   { label:'Autorité concernée *', placeholder:'Ex : Préfecture, ANTAI, Ministère de l\'Intérieur…', tip:'Indiquez l\'organisme mentionné sur votre courrier officiel.' },
      },
      'demeure-dette': {
        problem: { label:'Décrivez la situation *', placeholder:'S\'agit-il d\'une somme à recouvrer ou d\'une dette contestée ? Quel est le contexte (prêt, impayé, prestation non réglée) ?' },
        when:    { label:'Date d\'échéance et relances effectuées *', placeholder:'Ex : La facture était due le 1er janvier 2024. Relances envoyées les 7 jan, 20 jan. Aucun paiement à ce jour.' },
        party:   { label:'Débiteur ou créancier *', placeholder:'Nom de la personne ou de l\'entreprise concernée', tip:'Selon votre situation : la personne qui vous doit de l\'argent ou celle à qui vous devez.' },
      },
      'demeure-avertissement': {
        problem: { label:'Décrivez la situation *', placeholder:'Quelle mise en demeure avez-vous reçue ou souhaitez-vous envoyer ? Quel est le différend sous-jacent ?' },
        when:    { label:'Date de réception et délai imparti *', placeholder:'Ex : Mise en demeure reçue le 5 avril 2024 avec un délai de 15 jours pour régulariser avant toute poursuite.' },
        party:   { label:'Expéditeur / destinataire *', placeholder:'Nom de la personne ou de la société concernée', tip:'Indiquez le nom tel qu\'il figure sur le courrier officiel.' },
      },
      'famille-divorce': {
        problem: { label:'Décrivez la situation *', placeholder:'Divorce à l\'amiable ou conflictuel ? Enfants communs ? Résidence alternée ? Biens immobiliers à partager ? Expliquez la situation globale.' },
        when:    { label:'Date de mariage et de séparation *', placeholder:'Ex : Mariés le 12 juin 2015. Séparés depuis janvier 2024. Aucune procédure n\'a encore été engagée.' },
        party:   { label:'Nom de l\'époux(se) *', placeholder:'Prénom et nom de votre conjoint(e)', tip:'Tel qu\'il figure sur votre acte de mariage.' },
      },
      'famille-pension': {
        problem: { label:'Décrivez la situation *', placeholder:'Pension non versée, montant insuffisant, révision souhaitée à la hausse ou à la baisse ? Expliquez la situation.' },
        when:    { label:'Depuis quand et montant actuel *', placeholder:'Ex : La pension de 400 €/mois fixée par jugement n\'a pas été versée depuis février 2024. Soit 2 mensualités impayées.' },
        party:   { label:'Nom de l\'autre parent *', placeholder:'Prénom et nom', tip:'Tel qu\'il figure sur la décision de justice ou l\'accord homologué.' },
      },
    };
    const getCtxFields = (cat, sub) =>
      CONTEXT_FIELDS[cat + '-' + sub] || {
        problem: { label:'Précisez votre situation et le problème rencontré *', placeholder:'Expliquez en détail le type de litige, ce qui s\'est passé, et le contexte général. Plus vous êtes précis, mieux nous pourrons vous aider.' },
        when:    { label:'Dates et chronologie des faits *', placeholder:'Ex : Le problème a commencé le… Premières démarches le… Dernier échange le…' },
        party:   { label:'Partie adverse *', placeholder:'Nom complet de la personne, entreprise ou administration concernée', tip:'Indiquez le nom tel qu\'il figure sur les documents officiels (contrat, courrier, facture…).' },
      };

    /* ── InfoTip (bulle d'aide) ─────────────────────────── */

    const InfoTip = ({ text }) => {
      const [show, setShow] = useState(false);
      return (
        <span style={{ position:'relative', display:'inline-flex', alignItems:'center', marginLeft:5 }}>
          <span
            onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
            style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:15, height:15, borderRadius:'50%', border:'1px solid var(--border-default)', color:'var(--text-subtle)', fontSize:9, cursor:'default', fontWeight:700 }}
          >?</span>
          {show && (
            <div style={{ position:'absolute', bottom:22, left:'50%', transform:'translateX(-50%)', background:'var(--bg-surface-elevated)', border:'1px solid var(--border-default)', borderRadius:8, padding:'8px 11px', width:210, zIndex:9999, fontSize:12, color:'var(--text-body)', lineHeight:1.5, boxShadow:'0 8px 24px rgba(0,0,0,0.18)', pointerEvents:'none' }}>
              {text}
            </div>
          )}
        </span>
      );
    };

    /* ── DemarcheFormModal ──────────────────────────────── */

    /* ── Helpers partagés (hors composant pour éviter le remontage) ── */
    const dmInp = { width:'100%', padding:'10px 13px', background:'var(--bg-panel)', border:'1px solid var(--border-default)', borderRadius:8, color:'var(--text-primary)', fontSize:14, fontFamily:'Inter,sans-serif', outline:'none', transition:'border-color 0.15s', boxSizing:'border-box' };
    const dmLbl = { fontSize:12, fontWeight:510, color:'var(--text-muted)', marginBottom:5, display:'flex', alignItems:'center', gap:0 };

    const DmField = ({ label, placeholder, value, onChange, tooltip, textarea, numeric, date, optional }) => {
      const handleChange = (raw) => {
        if (date) {
          const digits = raw.replace(/\D/g, '').slice(0, 8);
          let fmt = digits;
          if (digits.length >= 5) fmt = digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4);
          else if (digits.length >= 3) fmt = digits.slice(0,2) + '/' + digits.slice(2);
          onChange(fmt);
        } else if (numeric) {
          const cleaned = raw.replace(/[^0-9.]/g, '').replace(/\.{2,}/g, '.').replace(/(\.\d*)\./, '$1');
          onChange(cleaned);
        } else {
          onChange(raw);
        }
      };
      return (
        <div style={{marginBottom:14}}>
          <label style={dmLbl}>
            {label}
            {optional && <span style={{fontSize:11, color:'var(--text-subtle)', fontWeight:400, marginLeft:5}}>(optionnel)</span>}
            {tooltip && <InfoTip text={tooltip}/>}
          </label>
          {textarea
            ? <textarea value={value} onChange={e=>handleChange(e.target.value)} placeholder={placeholder} rows={4}
                style={{...dmInp, resize:'vertical', minHeight:88}}
                onFocus={e=>e.target.style.borderColor='#5e6ad2'} onBlur={e=>e.target.style.borderColor='var(--border-default)'} />
            : <input value={value} onChange={e=>handleChange(e.target.value)} placeholder={placeholder} style={dmInp}
                inputMode={date || numeric ? 'numeric' : 'text'}
                onFocus={e=>e.target.style.borderColor='#5e6ad2'} onBlur={e=>e.target.style.borderColor='var(--border-default)'} />
          }
        </div>
      );
    };
    const DmRow  = ({children}) => <div style={{display:'flex', gap:12}}>{children}</div>;
    const DmHalf = ({children}) => <div style={{flex:1,minWidth:0}}>{children}</div>;

    /* ── DmAutocomplete (DmField + suggestions) ───────────── */
    const DmAutocomplete = ({ label, placeholder, value, onChange, optional, tooltip, fetchFn, formatLabel, formatHint, minChars }) => (
      <div style={{marginBottom:14}}>
        <label style={dmLbl}>
          {label}
          {optional && <span style={{fontSize:11, color:'var(--text-subtle)', fontWeight:400, marginLeft:5}}>(optionnel)</span>}
          {tooltip && <InfoTip text={tooltip}/>}
        </label>
        <Autocomplete
          value={value} onChange={onChange} placeholder={placeholder}
          fetchFn={fetchFn} formatLabel={formatLabel} formatHint={formatHint} minChars={minChars}
        />
      </div>
    );

    const DRAFT_KEY    = 'avocai_demarche_draft';
    const IDENTITY_KEY = 'avocai_identity_saved';

    const IdentitySaveBtn = ({ data }) => {
      const [saved, setSaved] = useState(() => !!localStorage.getItem(IDENTITY_KEY));
      const save = e => {
        e.stopPropagation();
        const { firstName, lastName, birthDate, birthPlace, nationality, address, phone, email, profession } = data;
        localStorage.setItem(IDENTITY_KEY, JSON.stringify({ firstName, lastName, birthDate, birthPlace, nationality, address, phone, email, profession }));
        setSaved(true);
      };
      return (
        <div style={{marginTop:14, display:'flex', justifyContent:'flex-end'}}>
          {saved ? (
            <span style={{fontSize:12, color:'#22c55e', display:'flex', alignItems:'center', gap:5}}>
              <svg width="13" height="13" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#22c55e" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Informations mémorisées
            </span>
          ) : (
            <button type="button" onClick={save}
              style={{display:'flex', alignItems:'center', gap:6, padding:'6px 12px', borderRadius:7, border:'1px solid var(--border-default)', background:'transparent', color:'var(--text-muted)', fontSize:12, cursor:'pointer', transition:'all 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#5e6ad2';e.currentTarget.style.color='#7170ff';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border-default)';e.currentTarget.style.color='var(--text-muted)';}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              S'en rappeler pour mes prochaines démarches
            </button>
          )}
        </div>
      );
    };

    const DemarcheFormModal = ({ onClose, onSubmit, userPlan, initialCategory }) => {
      const [step, setStep] = useState(1);
      const [showUpsell, setShowUpsell] = useState(false);
      const [data, setData] = useState(() => {
        try { const d = localStorage.getItem(DRAFT_KEY); if (d) return JSON.parse(d); } catch {}
        const u = getStoredUser();
        let saved = {};
        try { const s = localStorage.getItem('avocai_identity_saved'); if (s) saved = JSON.parse(s); } catch {}
        return {
          firstName: saved.firstName || u?.firstName||'', lastName: saved.lastName || u?.lastName||'',
          birthDate: saved.birthDate||'', birthPlace: saved.birthPlace||'', nationality: saved.nationality||'Française',
          address: saved.address||'', phone: saved.phone||'', email: saved.email || u?.email||'', profession: saved.profession||'',
          category: initialCategory||'', subcategory:'',
          problemDescription:'', timeline:'', adverseParty:'', adverseAddress:'',
          addl:{},
        };
      });
      const STEPS = ['Identité','Type','Contexte','Détails'];

      const upd = (k,v) => setData(p => ({...p,[k]:v}));
      const updAddl = (k,v) => setData(p => ({...p, addl:{...p.addl,[k]:v}}));

      const canNext = () => {
        if (step===1) return data.firstName && data.lastName && data.birthDate && data.birthPlace && data.nationality && data.address && data.phone && data.email && data.profession;
        if (step===2) return data.category && data.subcategory;
        if (step===3) return data.problemDescription && data.timeline && data.adverseParty;
        if (step===4) {
          const addlOk = addlFields.every(f => f.optional || (data.addl[f.id]||'').toString().trim());
          const lawyerOk = !data.wantsLawyer || (data.lawyerCity||'').toString().trim();
          return addlOk && lawyerOk;
        }
        return true;
      };

      const curCat = DEMARCHE_CATS.find(c=>c.id===data.category);
      const addlFields = getAddlFields(data.category, data.subcategory);

      return (
        <>
        <div style={{ position:'fixed', inset:0, zIndex:600, background:'rgba(0,0,0,0.58)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
          onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
          <div style={{ background:'var(--bg-surface)', border:'1px solid var(--border-default)', borderRadius:16, width:'100%', maxWidth:560, maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'0 24px 80px rgba(0,0,0,0.35)' }}>

            {/* ─ Header ─ */}
            <div style={{padding:'20px 24px 0', flexShrink:0}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
                <div>
                  <div style={{fontSize:11, fontWeight:510, color:'#7170ff', textTransform:'uppercase', letterSpacing:0.5, marginBottom:3}}>✦ Constitution de dossier</div>
                  <div style={{fontSize:18, fontWeight:590, color:'var(--text-primary)', letterSpacing:'-0.2px'}}>
                    {step===1?'Votre identité':step===2?'Nature de la demande':step===3?'Contexte de la situation':'Informations complémentaires'}
                  </div>
                </div>
                <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', fontSize:20, padding:4, lineHeight:1, marginTop:-2}}>✕</button>
              </div>

              {/* Progress */}
              <div style={{marginBottom:20}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:8}}>
                  {STEPS.map((s,i)=>(
                    <div key={i} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:5, flex:1}}>
                      <div style={{ width:26, height:26, borderRadius:'50%', background: i+1<step?'#27a644': i+1===step?'#5e6ad2':'var(--bg-panel)', border:`2px solid ${i+1<=step?'#5e6ad2':'var(--border-default)'}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color: i+1<=step?'#fff':'var(--text-subtle)', transition:'all 0.2s' }}>
                        {i+1<step?'✓':i+1}
                      </div>
                      <span style={{fontSize:10, color: i+1===step?'var(--text-primary)':'var(--text-subtle)', fontWeight: i+1===step?600:400}}>{s}</span>
                    </div>
                  ))}
                </div>
                <div style={{height:2, background:'var(--border-default)', borderRadius:9999, overflow:'hidden'}}>
                  <div style={{height:'100%', width:((step-1)/3*100)+'%', background:'#5e6ad2', borderRadius:9999, transition:'width 0.3s ease'}}/>
                </div>
              </div>
            </div>

            {/* ─ Scrollable body ─ */}
            <div style={{flex:1, overflowY:'auto', padding:'4px 24px 0'}}>

              {/* Step 1 — Identité */}
              {step===1 && <>
                <DmRow><DmHalf><DmField id="fn" label="Prénom *" placeholder="Jean" value={data.firstName} onChange={v=>upd('firstName',v)}/></DmHalf>
                     <DmHalf><DmField id="ln" label="Nom *"    placeholder="Dupont" value={data.lastName} onChange={v=>upd('lastName',v)}/></DmHalf></DmRow>
                <DmRow>
                  <DmHalf><DmField id="bd" label="Date de naissance *" placeholder="JJ/MM/AAAA" date value={data.birthDate} onChange={v=>upd('birthDate',v)}/></DmHalf>
                  <DmHalf><DmAutocomplete label="Lieu de naissance *" placeholder="Ex : Paris, Lyon, Marseille…"
                    value={data.birthPlace} onChange={v=>upd('birthPlace',v)}
                    fetchFn={fetchCommunes} formatLabel={c=>c.nom} formatHint={c=>c.codesPostaux?.[0]||''}/></DmHalf>
                </DmRow>
                <DmAutocomplete label="Nationalité *" placeholder="Ex : Française, Belge, Algérienne…"
                  value={data.nationality} onChange={v=>upd('nationality',v)}
                  fetchFn={filterStatic(NATIONALITIES)} formatLabel={c=>c.name}/>
                <DmAutocomplete label="Adresse postale complète *" placeholder="12 rue de la Paix, 75001 Paris"
                  value={data.address} onChange={v=>upd('address',v)}
                  fetchFn={fetchAddresses} formatLabel={a=>a.label} formatHint={a=>a.context||''} minChars={3}/>
                <DmRow><DmHalf><DmField id="tel" label="Téléphone *" placeholder="06 12 34 56 78" value={data.phone} onChange={v=>upd('phone',v)}/></DmHalf>
                     <DmHalf><DmField id="em" label="Email *" placeholder="vous@exemple.com" value={data.email} onChange={v=>upd('email',v)}/></DmHalf></DmRow>
                <DmAutocomplete label="Profession *" placeholder="Ex : Salarié, Indépendant, Étudiant…"
                  value={data.profession} onChange={v=>upd('profession',v)}
                  tooltip="Parfois requis pour l'aide juridictionnelle ou le calcul du préjudice."
                  fetchFn={filterStatic(PROFESSIONS)} formatLabel={c=>c.name}/>
                {/* Bouton mémoriser identité */}
                <IdentitySaveBtn data={data} />
              </>}

              {/* Step 2 — Catégorie */}
              {step===2 && <>
                <div style={{fontSize:13, color:'var(--text-muted)', marginBottom:14}}>Choisissez la catégorie qui correspond à votre situation.</div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:18}}>
                  {DEMARCHE_CATS.map(cat=>(
                    <div key={cat.id} onClick={()=>{ upd('category',cat.id); upd('subcategory',''); }}
                      style={{ padding:'12px 14px', borderRadius:10, cursor:'pointer', border:`2px solid ${data.category===cat.id?'#5e6ad2':'var(--border-default)'}`, background: data.category===cat.id?'rgba(94,106,210,0.09)':'var(--bg-panel)', transition:'all 0.15s' }}>
                      <div style={{fontSize:20, marginBottom:4}}>{cat.icon}</div>
                      <div style={{fontSize:13, fontWeight:510, color:'var(--text-primary)', lineHeight:1.3}}>{cat.label}</div>
                    </div>
                  ))}
                </div>
                {curCat && <>
                  <div style={{fontSize:11, fontWeight:600, color:'var(--text-subtle)', textTransform:'uppercase', letterSpacing:0.5, marginBottom:8}}>Précisez votre demande</div>
                  <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:8}}>
                    {curCat.subs.map(sub=>(
                      <div key={sub.id} onClick={()=>upd('subcategory',sub.id)}
                        style={{ padding:'11px 14px', borderRadius:8, cursor:'pointer', border:`1.5px solid ${data.subcategory===sub.id?'#5e6ad2':'var(--border-default)'}`, background: data.subcategory===sub.id?'rgba(94,106,210,0.07)':'transparent', display:'flex', alignItems:'center', gap:10, transition:'all 0.15s' }}>
                        <div style={{ width:16, height:16, borderRadius:'50%', border:`2px solid ${data.subcategory===sub.id?'#5e6ad2':'var(--border-default)'}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                          {data.subcategory===sub.id && <div style={{width:6,height:6,borderRadius:'50%',background:'#5e6ad2'}}/>}
                        </div>
                        <span style={{fontSize:14, color:'var(--text-body)'}}>{sub.label}</span>
                      </div>
                    ))}
                  </div>
                </>}
              </>}

              {/* Step 3 — Contexte (adaptatif selon catégorie) */}
              {step===3 && (()=>{
                const ctx = getCtxFields(data.category, data.subcategory);
                return <>
                  <DmField id="pb" label={ctx.problem.label} placeholder={ctx.problem.placeholder} value={data.problemDescription} onChange={v=>upd('problemDescription',v)} textarea/>
                  <DmField id="tl" label={ctx.when.label} placeholder={ctx.when.placeholder} value={data.timeline} onChange={v=>upd('timeline',v)} textarea/>
                  <DmField id="ap" label={ctx.party.label} placeholder={ctx.party.placeholder} value={data.adverseParty} onChange={v=>upd('adverseParty',v)} tooltip={ctx.party.tip}/>
                  <DmField id="aa" label="Adresse de la partie adverse" placeholder="Siège social ou adresse personnelle" optional value={data.adverseAddress} onChange={v=>upd('adverseAddress',v)}/>
                </>;
              })()}

              {/* Step 4 — Infos complémentaires */}
              {step===4 && <>
                {/* Checkbox avocat + localisation */}
                <div style={{marginTop:22, borderRadius:12, border:`1.5px solid ${data.wantsLawyer?'#5e6ad2':'var(--border-default)'}`, overflow:'hidden', transition:'border-color 0.2s'}}>
                  <div onClick={()=>upd('wantsLawyer',!data.wantsLawyer)} style={{padding:'14px 16px', background:data.wantsLawyer?'rgba(94,106,210,0.07)':'var(--bg-subtle,transparent)', cursor:'pointer', transition:'background 0.2s'}}>
                    <div style={{display:'flex', alignItems:'center', gap:12}}>
                      <div style={{width:20, height:20, borderRadius:4, border:`2px solid ${data.wantsLawyer?'#5e6ad2':'var(--border-default)'}`, background:data.wantsLawyer?'#5e6ad2':'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'all 0.15s'}}>
                        {data.wantsLawyer && <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                      <div>
                        <div style={{fontSize:14, fontWeight:600, color:'var(--text-primary)'}}>Souhaitez-vous contacter un avocat ?</div>
                        <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>Nous trouverons les avocats les plus adaptés à votre dossier, près de chez vous.</div>
                      </div>
                    </div>
                  </div>
                  {/* Swipe reveal — champ localisation */}
                  <div style={{maxHeight: data.wantsLawyer ? '160px' : '0', overflow:'hidden', transition:'max-height 0.35s cubic-bezier(0.4,0,0.2,1)'}}>
                    <div style={{padding:'0 16px 16px', borderTop:`1px solid rgba(94,106,210,0.2)`, paddingTop:14}} onClick={e=>e.stopPropagation()}>
                      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6}}>
                        <label style={{fontSize:12, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.03em'}}>
                          📍 Votre commune <span style={{color:'#7170ff'}}>*</span>
                        </label>
                        <button type="button" onClick={e=>{ e.stopPropagation(); if(!navigator.geolocation){return;} upd('lawyerCity','Localisation en cours…'); navigator.geolocation.getCurrentPosition(async pos=>{ try{ const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`); const d=await r.json(); upd('lawyerCity', d.address?.city||d.address?.town||d.address?.village||d.address?.county||''); }catch{ upd('lawyerCity',''); } }, ()=>upd('lawyerCity','')); }}
                          style={{display:'flex', alignItems:'center', gap:5, padding:'4px 10px', borderRadius:6, border:'1px solid rgba(113,112,255,0.35)', background:'rgba(94,106,210,0.08)', color:'#7170ff', fontSize:11, fontWeight:600, cursor:'pointer', transition:'background 0.15s'}}
                          onMouseEnter={e=>e.currentTarget.style.background='rgba(94,106,210,0.18)'}
                          onMouseLeave={e=>e.currentTarget.style.background='rgba(94,106,210,0.08)'}>
                          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                          Me localiser
                        </button>
                      </div>
                      <CommuneAutocomplete
                        value={data.lawyerCity||''}

      const [done, setDone] = useState(false);

      useEffect(()=>{
        let tm;
        const rand = () => 2000 + Math.floor(Math.random() * 5001); // 2–7 s
        const advance = (next) => {
          tm = setTimeout(() => {
            if (next < steps.length) { setCur(next); advance(next + 1); }
            else { setDone(true); }
          }, rand());
        };
        advance(1);
        return () => clearTimeout(tm);
      },[]);

      useEffect(()=>{ if(done) onComplete(); },[done]);

                  </div>
                  <button onClick={()=>onSelect(p.id, monthly)}
                    style={{width:'100%', padding:'11px 0', borderRadius:9, border: p.badge?'none':'1px solid var(--border-default)', background: p.badge?'#5e6ad2':'transparent', color: p.badge?'#fff':'var(--text-body)', fontSize:14, fontWeight:590, cursor:'pointer', transition:'all 0.15s'}}
                    onMouseEnter={e=>{ e.currentTarget.style.background = p.badge?'#828fff':'var(--bg-surface-elevated)'; }}
                    onMouseLeave={e=>{ e.currentTarget.style.background = p.badge?'#5e6ad2':'transparent'; }}>
                    Choisir {p.name}
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    /* ── Chat Interface ──────────────────────────────────── */

    const ChatInterface = ({ setPage, heroMessage, onHeroMessageConsumed, onUserUpdate }) => {
      const [messages, setMessages] = useState(() => {
        const saved = sessionStorage.getItem('avocai_guest_session');
        if (saved && getToken()) {
          try {
            sessionStorage.removeItem('avocai_guest_session');
            return JSON.parse(saved);
          } catch { return []; }
        }
        return [];
      });
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [convTitle, setConvTitle] = useState(null);
      const [convId, setConvId] = useState(null);
      const [conversations, setConversations] = useState([]);
      const [user, setUser] = useState(getStoredUser());
      const [authChecked, setAuthChecked] = useState(false);
      const [isGuest, setIsGuest] = useState(!getToken());
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [quota, setQuota] = useState(null);
      const [guestExhausted, setGuestExhausted] = useState(() => !!localStorage.getItem('avocai_guest_exhausted'));
      const bottomRef = useRef(null);
      const heroSentRef = useRef(false);
      const [demarcheState, setDemarcheState] = useState(null); // null | 'form' | 'loading' | 'result' | 'lawyers'
      const [demarcheData, setDemarcheData] = useState(null);
      const [demarcheWantsLawyer, setDemarcheWantsLawyer] = useState(false);
      const [demarcheInitialCat, setDemarcheInitialCat] = useState(null);
      const openDemarche = (initialCategory) => { setDemarcheInitialCat(initialCategory||null); setDemarcheState('form'); };

      // Écoute l'événement navbar "Contacter un avocat"
      useEffect(() => {
        const handler = e => openDemarche(e.detail?.initialCategory);
        window.addEventListener('avocai:open-demarche', handler);
        return () => window.removeEventListener('avocai:open-demarche', handler);
      }, []);

      // Auth check + initial conv load
      useEffect(() => {
        // Invité : pas de redirection, mode guest
        if (!getToken()) {
          setIsGuest(true);
          setAuthChecked(true);
          return;
        }
        (async () => {
          try {
            const meRes = await fetch('/api/auth/me', { headers: authHeaders() });
            if (!meRes.ok) { logout(); return; }
            const me = await meRes.json();
            setUser(me.user);
            localStorage.setItem('avocai_user', JSON.stringify(me.user));
            onUserUpdate?.(me.user);
            const [cRes, qRes] = await Promise.all([
              fetch('/api/conversations', { headers: authHeaders() }),
              fetch('/api/quota/status', { headers: authHeaders() }),
            ]);
            if (cRes.ok) {
              const { conversations: convs } = await cRes.json();
              setConversations(convs);
            }
            if (qRes.ok) {
              setQuota(await qRes.json());
            }
            // Import guest session as a real conversation after login
            const guestRaw = sessionStorage.getItem('avocai_guest_raw');
            if (guestRaw) {
              sessionStorage.removeItem('avocai_guest_raw');
              localStorage.removeItem('avocai_guest_exhausted');
              try {
                const { userMessage, aiResponse } = JSON.parse(guestRaw);
                const importRes = await fetch('/api/conversations/import-guest', {
                  method: 'POST',
                  headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                  body: JSON.stringify({ userMessage, aiResponse }),
                });
                if (importRes.ok) {
                  const { conversation_id, title } = await importRes.json();
                  setConvId(conversation_id);
                  setConvTitle(title);
                  const cRes2 = await fetch('/api/conversations', { headers: authHeaders() });
                  if (cRes2.ok) { const { conversations: convs2 } = await cRes2.json(); setConversations(convs2); }
                }
              } catch {}
            }
            // Post-upgrade : Premium → recherche avocat ; Premium+ → résultat dossier + sauvegarde serveur
            const planVal = me.user?.plan;
            if (planVal === 'pro' || planVal === 'pro_plus') {
              try {
                const pending = localStorage.getItem(DOSSIER_KEY);
                if (pending) {
                  const pendingData = JSON.parse(pending);
                  setDemarcheData(pendingData);
                  if (planVal === 'pro_plus') {
                    // Sauvegarde serveur du dossier rempli en gratuit (évite de refaire la démarche)
                    const catLabel = DEMARCHE_CATS.find(c=>c.id===pendingData.category)?.label || 'Démarche';
                    const subLabel = DEMARCHE_CATS.find(c=>c.id===pendingData.category)?.subs?.find(s=>s.id===pendingData.subcategory)?.label || catLabel;
                    fetch('/api/dossiers', {
                      method: 'POST',
                      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                      body: JSON.stringify({ title: subLabel, category: pendingData.category, data: pendingData }),
                    }).catch(() => {});
                    setDemarcheState('result');
                    localStorage.removeItem(DOSSIER_KEY);
                  } else {
                    // Premium simple : pas de dossier, direct recherche avocat
                    setDemarcheState('lawyers');
                    localStorage.removeItem(DOSSIER_KEY);
                  }
                }
              } catch {}
            }
            setAuthChecked(true);
          } catch { logout(); }
        })();
      }, []);

      const transformAiMessage = (m) => {
        const articles = (m.articles || []).map(a => {
          const parts = (a.code || '').split('—');
          return {
            code: parts[0]?.trim() || a.code,
            title: parts[1]?.trim() || '',
            excerpt: a.texte,
            link: a.lien,
          };
        });
        return {
          role: 'ai',
          contexte: m.contexte,
          summary: m.resume,
          risk: m.risque_niveau || 3,
          probability: m.probabilite,
          delai: m.delai_legal,
          sanctions: m.sanctions || null,
          articles,
          actions: m.actions_gratuites || [],
          premium: m.demarche_disponible,
          premiumTitle: m.demarche_titre,
          premiumBody: m.demarche_description,
        };
      };

      const loadConversation = async (id) => {
        try {
          const res = await fetch('/api/conversations/' + id, { headers: authHeaders() });
          if (!res.ok) return;
          const { conversation, messages: msgs } = await res.json();
          const transformed = msgs.map(m => m.role === 'ai' ? transformAiMessage(m) : m);
          setConvId(conversation.id);
          setConvTitle(conversation.title);
          setMessages(transformed);
        } catch {}
      };

      const newConversation = () => {
        setMessages([]);
        setConvTitle(null);
        setConvId(null);
      };

      const handleSend = async (text) => {
        const msg = (text || input).trim();
        if (!msg || loading) return;

        // Invité → 1 requête via endpoint guest
        if (isGuest && !guestExhausted) {
          setInput('');
          if (!convTitle) setConvTitle(msg.length > 40 ? msg.slice(0, 40) + '…' : msg);
          const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          setMessages(prev => [...prev, { role: 'user', text: msg, time: now }]);
          setLoading(true);
          try {
            const res = await fetch('/api/chat/guest', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: msg }),
            });
            const body = await res.json();
            if (res.status === 429 || body.exhausted) {
              localStorage.setItem('avocai_guest_exhausted', '1');
              setGuestExhausted(true);
              return;
            }
            if (!res.ok) { setMessages(prev => [...prev, { role: 'error', text: body.error || 'Erreur serveur.' }]); return; }
            const articles = (body.articles || []).map(a => {
              const parts = (a.code || '').split('—');
              return { code: parts[0]?.trim() || a.code, title: parts[1]?.trim() || '', excerpt: a.texte, link: a.lien };
            });
            setMessages(prev => [...prev, {
              role: 'ai', time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
              contexte: body.contexte, summary: body.resume, risk: body.risque_niveau || 3,
              probability: body.probabilite, delai: body.delai_legal, sanctions: body.sanctions || null,
              articles, actions: body.actions_gratuites || [],
              premium: body.demarche_disponible, premiumTitle: body.demarche_titre, premiumBody: body.demarche_description,
            }]);
            sessionStorage.setItem('avocai_guest_raw', JSON.stringify({ userMessage: msg, aiResponse: body }));
            localStorage.setItem('avocai_guest_exhausted', '1');
            setGuestExhausted(true);
          } catch (err) {
            setMessages(prev => [...prev, { role: 'error', text: err.message }]);
          } finally { setLoading(false); }
          return;
        }

        // Invité sans pass → sauvegarder le message + modale de connexion
        if (isGuest) {
          sessionStorage.setItem('avocai_pending_message', msg);
          setShowLoginModal(true);
          return;
        }

        setInput('');
        if (!convTitle) setConvTitle(msg.length > 40 ? msg.slice(0, 40) + '…' : msg);

        const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        const userMsg = { role: 'user', text: msg, time: now };
        setMessages(prev => [...prev, userMsg]);
        setLoading(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ message: msg, conversation_id: convId }),
          });
          if (res.status === 401) { logout(); return; }

          // Quota dépassé — délai artificiel pour simuler la réflexion de l'IA
          if (res.status === 429) {
            const body = await res.json();
            await new Promise(r => setTimeout(r, 1800));
            setQuota(prev => prev ? { ...prev, used: prev.limit, remaining: 0 } : null);
            setMessages(prev => [...prev, { role: 'quota', quota: body.quota, text: body.error }]);
            return;
          }

          if (!res.ok) {
            let errMsg = `Erreur serveur (${res.status})`;
            try { const body = await res.json(); if (body.error) errMsg = body.error; } catch {}
            throw new Error(errMsg);
          }
          const data = await res.json();

          if (data.conversation_id && !convId) {
            setConvId(data.conversation_id);
            try {
              const cRes = await fetch('/api/conversations', { headers: authHeaders() });
              if (cRes.ok) { const { conversations: convs } = await cRes.json(); setConversations(convs); }
            } catch {}
          }

          // Mettre à jour le quota affiché
          if (data.quota) {
            setQuota(prev => prev
              ? { ...prev, used: data.quota.used, remaining: Math.max(0, prev.limit - data.quota.used) }
              : null
            );
          }

          const articles = (data.articles || []).map(a => {
            const parts = (a.code || '').split('—');
            return {
              code: parts[0]?.trim() || a.code,
              title: parts[1]?.trim() || '',
              excerpt: a.texte,
              link: a.lien,
            };
          });

          const aiMsg = {
            role: 'ai',
            time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
            contexte: data.contexte,
            summary: data.resume,
            risk: data.risque_niveau || 3,
            probability: data.probabilite,
            delai: data.delai_legal,
            sanctions: data.sanctions || null,
            articles,
            actions: data.actions_gratuites || [],
            premium: data.demarche_disponible,
            premiumTitle: data.demarche_titre,
            premiumBody: data.demarche_description,
          };
          setMessages(prev => [...prev, aiMsg]);
        } catch (err) {
          const errorMsg = {
            role: 'error',
            text: err.message.includes('fetch')
              ? "Impossible de contacter le serveur. Vérifiez que le serveur est démarré avec npm start."
              : err.message,
          };
          setMessages(prev => [...prev, errorMsg]);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      useEffect(() => {
        if (authChecked && heroMessage && !heroSentRef.current) {
          heroSentRef.current = true;
          onHeroMessageConsumed?.();
          handleSend(heroMessage);
        }
      }, [authChecked, heroMessage]);

      // Déclenche le flou dès qu'un invité reçoit une réponse IA (sécurité)
      useEffect(() => {
        if (isGuest && !guestExhausted && messages.some(m => m.role === 'ai')) {
          localStorage.setItem('avocai_guest_exhausted', '1');
          setGuestExhausted(true);
        }
      }, [messages]);

      useEffect(() => {
        if (authChecked) {
          const pending = sessionStorage.getItem('avocai_pending_message');
          if (pending) {
            sessionStorage.removeItem('avocai_pending_message');
            handleSend(pending);
          }
        }
      }, [authChecked]);

      return (
        <div style={{ display: 'flex', height: 'calc(100vh - 56px)', overflow: 'hidden' }}>
          {/* Modale invité */}
          {showLoginModal && (
            <LoginModal
              onClose={() => setShowLoginModal(false)}
              onContinueAsGuest={() => {
                localStorage.setItem('avocai_guest_allowed', '1');
                setShowLoginModal(false);
                if (input.trim()) handleSend(input.trim());
              }}
            />
          )}

          {/* ── Démarche modales ── */}
          {demarcheState === 'form' && (
            <DemarcheFormModal
              onClose={() => setDemarcheState(null)}
              onSubmit={(formData) => {
                localStorage.setItem(DOSSIER_KEY, JSON.stringify(formData));
                setDemarcheData(formData);
                setDemarcheWantsLawyer(!!formData.wantsLawyer);
                // Sauvegarde serveur uniquement Premium+ (Premium simple n'a pas accès aux dossiers)
                if (getToken() && (user?.plan === 'pro_plus' || user?.plan === 'admin')) {
                  const catLabel = DEMARCHE_CATS.find(c=>c.id===formData.category)?.label || 'Démarche';
                  const subLabel = DEMARCHE_CATS.find(c=>c.id===formData.category)?.subs?.find(s=>s.id===formData.subcategory)?.label || catLabel;
                  fetch('/api/dossiers', {
                    method: 'POST',
                    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: subLabel, category: formData.category, data: formData }),
                  }).catch(() => {});
                }
                setDemarcheState('loading');
              }}
              userPlan={user?.plan}
              initialCategory={demarcheInitialCat}
            />
          )}
          {demarcheState === 'loading' && (
            <DemarcheLoading onComplete={() => {
              const isPremium = user?.plan === 'pro' || user?.plan === 'pro_plus';
              setDemarcheState(demarcheWantsLawyer && isPremium ? 'lawyers' : 'result');
            }} />
          )}
          {demarcheState === 'lawyers' && (
            <LawyerMatchModal
              formData={demarcheData}
              onClose={() => setDemarcheState(null)}
              onViewDossier={() => setDemarcheState('result')}
            />
          )}
          {demarcheState === 'result' && (
            <DemarcheResult
              data={demarcheData}
              isPro={user?.plan === 'pro' || user?.plan === 'pro_plus'}
              onClose={() => setDemarcheState(null)}
              onUpgrade={() => setDemarcheState('plan')}
            />
          )}
          {demarcheState === 'plan' && (
            <DemarchePlanPicker
              onClose={() => setDemarcheState('result')}
              onSelect={(plan, isMonthly) => {
                window.location.href = '/checkout?plan=' + plan + '&billing=' + (isMonthly ? 'monthly' : 'weekly');
              }}
            />
          )}

          {/* Sidebar */}
          {sidebarOpen && (
            <aside style={{ width: 260, flexShrink: 0, background: 'var(--bg-panel)', borderRight: '1px solid var(--border-subtle)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              <div style={{ padding: 12 }}>
                <button onClick={newConversation}
                  style={{ width: '100%', padding: '8px 16px', background: '#5e6ad2', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14, fontWeight: 510, fontFeatureSettings: '"cv01","ss03"', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}
                  onMouseEnter={e => e.currentTarget.style.background = '#828fff'}
                  onMouseLeave={e => e.currentTarget.style.background = '#5e6ad2'}
                >
                  <span style={{ fontSize: 16 }}>+</span> Nouvelle analyse
                </button>
              </div>

              {/* Conv list — invité ou connecté */}
              <div style={{ flex: 1, overflowY: 'auto', padding: '4px 8px' }}>
                {isGuest ? (
                  <div style={{ padding: '20px 12px', textAlign: 'center' }}>
                    <div style={{ fontSize: 13, color: 'var(--text-subtle)', lineHeight: 1.6, marginBottom: 12, fontFeatureSettings: '"cv01","ss03"' }}>
                      Connectez-vous pour sauvegarder vos analyses.
                    </div>
                    <button onClick={() => setShowLoginModal(true)} style={{
                      width: '100%', padding: '8px 12px', borderRadius: 6,
                      border: '1px solid #5e6ad2', background: 'transparent',
                      color: '#7170ff', fontSize: 13, fontWeight: 510,
                      cursor: 'pointer', fontFeatureSettings: '"cv01","ss03"',
                    }}>Se connecter</button>
                  </div>
                ) : (
                  <>
                    {conversations.length > 0 && (
                      <div style={{ fontSize: 11, fontWeight: 510, color: 'var(--text-subtle)', textTransform: 'uppercase', letterSpacing: 0.5, padding: '8px 8px 4px', fontFeatureSettings: '"cv01","ss03"' }}>Récent</div>
                    )}
                    {conversations.map(c => (
                      <div key={c.id} onClick={() => loadConversation(c.id)}
                        style={{
                          padding: '9px 10px', borderRadius: 6, marginBottom: 2, cursor: 'pointer',
                          background: c.id === convId ? 'var(--bg-surface)' : 'transparent',
                          borderLeft: c.id === convId ? '2px solid #5e6ad2' : '2px solid transparent',
                        }}
                        onMouseEnter={e => { if (c.id !== convId) e.currentTarget.style.background = 'var(--bg-surface)'; }}
                        onMouseLeave={e => { if (c.id !== convId) e.currentTarget.style.background = 'transparent'; }}
                      >
                        <div style={{ fontSize: 14, fontWeight: 400, color: 'var(--text-body)', fontFeatureSettings: '"cv01","ss03"', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.title || 'Sans titre'}</div>
                      </div>
                    ))}
                  </>
                )}
              </div>

              {/* Quota bar (utilisateurs connectés seulement) */}
              {!isGuest && <QuotaBar quota={quota} />}

              {/* User area */}
              {!isGuest ? (
                <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 30, height: 30, borderRadius: '50%', background: '#5e6ad2', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <span style={{ fontSize: 13, fontWeight: 510, color: '#fff' }}>{(user?.firstName || user?.email || '?')[0].toUpperCase()}</span>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 510, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {user?.firstName && user?.lastName ? `${user.firstName} ${user.lastName}` : user?.email || '—'}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text-subtle)', fontFeatureSettings: '"cv01","ss03"' }}>Plan {user?.plan === 'pro' ? 'Premium ✦' : user?.plan === 'pro_plus' ? 'Premium+ ✦' : 'Gratuit'}</div>
                  </div>
                  <button onClick={logout} title="Se déconnecter"
                    style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 14, padding: 4 }}
                    onMouseEnter={e => e.currentTarget.style.color = 'var(--text-primary)'}
                    onMouseLeave={e => e.currentTarget.style.color = 'var(--text-muted)'}
                  >⏻</button>
                </div>
              ) : (
                <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border-subtle)', textAlign: 'center' }}>
                  <span style={{ fontSize: 12, color: 'var(--text-subtle)', fontFeatureSettings: '"cv01","ss03"' }}>Mode invité</span>
                </div>
              )}
            </aside>
          )}

          {/* Main chat area */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--bg-page)' }}>
            {/* Chat header */}
            <div style={{ height: 48, borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', padding: '0 16px', gap: 12, flexShrink: 0 }}>
              <button onClick={() => setSidebarOpen(o => !o)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 18, padding: 4 }}>☰</button>
              <span style={{ fontSize: 15, fontWeight: 510, color: 'var(--text-primary)', fontFeatureSettings: '"cv01","ss03"' }}>
                {convTitle || 'Nouvelle analyse'}
              </span>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '24px 24px 8px', position: 'relative' }}>
              {messages.length === 0 ? (
                <EmptyState onSuggestion={handleSend} />
              ) : (
                <div style={{ maxWidth: 780, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 20 }}>
                  {messages.map((msg, i) => (
                    <div key={i} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }}>
                      {msg.role === 'user' ? (
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, maxWidth: '70%' }}>
                          <div style={{ background: '#5e6ad2', color: '#fff', borderRadius: 8, padding: '10px 14px', width: 'fit-content', fontSize: 15, lineHeight: 1.5, fontFeatureSettings: '"cv01","ss03"' }}>
                            {msg.text}
                          </div>
                          {msg.time && <span style={{ fontSize: 11, color: 'var(--text-subtle)', fontFeatureSettings: '"cv01","ss03"' }}>{msg.time}</span>}
                        </div>
                      ) : msg.role === 'error' ? (
                        <ErrorCard message={msg.text} />
                      ) : msg.role === 'quota' ? (
                        <div style={{ maxWidth: '88%' }}>
                          <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-default)', borderLeft: '3px solid #5e6ad2', borderRadius: 12, padding: '20px 24px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                              <span style={{ fontSize: 11, fontWeight: 600, color: '#7170ff', textTransform: 'uppercase', letterSpacing: 0.5, fontFeatureSettings: '"cv01","ss03"' }}>✦ Limite quotidienne atteinte</span>
                            </div>
                            <div style={{ fontSize: 16, fontWeight: 590, color: 'var(--text-primary)', marginBottom: 6, fontFeatureSettings: '"cv01","ss03"' }}>
                              {msg.quota?.plan === 'pro' || msg.quota?.plan === 'pro_plus'
                                ? 'Vous avez utilisé vos 50 analyses du jour'
                                : 'Vous avez utilisé vos 5 analyses gratuites du jour'}
                            </div>
                            <p style={{ fontSize: 14, color: 'var(--text-muted)', margin: '0 0 16px', lineHeight: 1.5, fontFeatureSettings: '"cv01","ss03"' }}>
                              {msg.quota?.plan === 'pro' || msg.quota?.plan === 'pro_plus'
