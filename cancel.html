<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvocAI — Paiement annulé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    (() => {
      const t = localStorage.getItem('avocai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    [data-theme="light"] {
      --bg-page:        #e8e9eb;
      --bg-card:        #ffffff;
      --text-primary:   #111827;
      --text-muted:     #4b5563;
      --border-default: rgba(0,0,0,0.18);
      --icon-bg:        #f3f4f6;
      --icon-color:     #6b7280;
    }
    [data-theme="dark"] {
      --bg-page:        #08090a;
      --bg-card:        #191a1b;
      --text-primary:   #f7f8f8;
      --text-muted:     #8a8f98;
      --border-default: rgba(255,255,255,0.08);
      --icon-bg:        rgba(255,255,255,0.04);
      --icon-color:     #8a8f98;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { transition: background-color 200ms ease, color 200ms ease; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: 18px;
      padding: 48px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
    }
    .logo span {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .icon-circle {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--icon-bg);
      border: 1.5px solid var(--border-default);
      color: var(--icon-color);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 26px;
      font-size: 30px;
    }
    h1 {
      font-size: 30px;
      font-weight: 590;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #5e6ad2;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.1px;
      transition: background 0.15s;
    }
    .btn:hover { background: #828fff; }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#5e6ad2"/>
        <path d="M7 20L14 8L21 20H17.5L14 13.5L10.5 20H7Z" fill="white" fill-opacity="0.95"/>
        <circle cx="14" cy="20" r="1.5" fill="#7170ff"/>
      </svg>
      <span>AvocAI</span>
    </a>

    <div class="icon-circle">✕</div>

    <h1>Paiement annulé</h1>
    <p>Aucun montant n'a été débité. Vous pouvez continuer à utiliser AvocAI gratuitement.</p>

    <a href="/" class="btn">Retour au site</a>
  </div>
</body>
</html>
